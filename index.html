      else         { coverEl.removeAttribute('src'); coverEl.style.display = 'none'; }
      document.getElementById('selectedTitle').textContent  = b.title;
      document.getElementById('selectedAuthor').textContent = b.author;
      document.getElementById('changeSelection').style.display = 'none';

      // Pre-fill rating + date + pages + notes from whatever's saved (date falls back to today when
      // converting a bedside/reading book that was never finished before).
      setRating((b.rating != null) ? b.rating : 5);
      setCompletedDateInput(b.completedAt);
      document.getElementById('addPageCount').value = b.pageCount || '';
      document.getElementById('addNotes').value  = b.notes || '';

      // Pre-select chips matching saved tags. CSS.escape handles values with slashes/spaces safely.
      clearAllChips();
      const activateChip = (groupId, value) => {
        if (!value) return;
        const chip = document.querySelector(`#${groupId} .chip[data-value="${CSS.escape(value)}"]`);
        if (chip) chip.classList.add('active');
      };
      (b.genres || []).forEach(g => activateChip('genreChips', g));
      (b.tone   || []).forEach(t => activateChip('toneChips',  t));
      activateChip('paceChips',    b.pace);
      activateChip('lengthChips',  b.lengthFelt);
      activateChip('chapterChips', b.chapterLength);

      modal.showModal();
    }

    // ---- Chip group helpers (review tagging) ----
    // Single-select groups: tapping one deactivates siblings. Multi: tapping just toggles.
    const CHIP_GROUPS = [
      { id: 'genreChips',   multi: true  },
      { id: 'paceChips',    multi: false },
      { id: 'toneChips',    multi: true  },
      { id: 'lengthChips',  multi: false },
      { id: 'chapterChips', multi: false },
    ];
    function setupChipGroup(id, multi) {
      document.getElementById(id).addEventListener('click', (e) => {
        const chip = e.target.closest('.chip');
        if (!chip) return;
        if (!multi) {
          document.querySelectorAll(`#${id} .chip.active`).forEach(c => {
            if (c !== chip) c.classList.remove('active');
          });
        }
        chip.classList.toggle('active');
      });
    }
    CHIP_GROUPS.forEach(g => setupChipGroup(g.id, g.multi));

    function chipValues(id) {
      return Array.from(document.querySelectorAll(`#${id} .chip.active`)).map(c => c.dataset.value);
    }
    function chipValue(id) {
      const active = document.querySelector(`#${id} .chip.active`);
      return active ? active.dataset.value : null;
    }
    function clearAllChips() {
      CHIP_GROUPS.forEach(g => {
        document.querySelectorAll(`#${g.id} .chip.active`).forEach(c => c.classList.remove('active'));
      });
    }

    // ---- Star picker (rating input) — supports half stars (0.5 steps) ----
    // Paint the five glyphs to show a rating; each fills 0 / 50 / 100%. Preview-only,
    // does not touch the stored value (used for hover feedback).
    function paintStars(v) {
      document.querySelectorAll('#ratingStars .star').forEach((star, idx) => {
        const pos = idx + 1;
        const fill = v >= pos ? 100 : (v >= pos - 0.5 ? 50 : 0);
        star.querySelector('i').style.width = fill + '%';
      });
    }
    function setRating(value) {
      // Snap to nearest half-star, clamp to 0.5–5.
      const v = Math.max(0.5, Math.min(5, Math.round((parseFloat(value) || 5) * 2) / 2));
      document.getElementById('addRating').value = String(v);
      document.getElementById('ratingStars').setAttribute('aria-valuenow', String(v));
      paintStars(v);
    }
    // Which rating does a pointer event on a star map to? Left half → x.5, right half → whole.
    // Keyboard/synthetic clicks (e.detail === 0) have no meaningful clientX, so pick the whole star.
    function ratingFromEvent(star, e) {
      const pos = parseInt(star.dataset.pos, 10);
      const rect = star.getBoundingClientRect();
      const isHalf = e.detail !== 0 && (e.clientX - rect.left) < rect.width / 2;
      return isHalf ? pos - 0.5 : pos;
    }
    const ratingStars = document.getElementById('ratingStars');
    ratingStars.addEventListener('click', (e) => {
      const star = e.target.closest('.star');
      if (!star) return;
      setRating(ratingFromEvent(star, e));
    });
    // Desktop hover preview so half-star targets are discoverable.
    ratingStars.addEventListener('mousemove', (e) => {
      const star = e.target.closest('.star');
      if (star) paintStars(ratingFromEvent(star, e));
    });
    ratingStars.addEventListener('mouseleave', () => {
      paintStars(parseFloat(document.getElementById('addRating').value) || 0);
    });
    setRating(5); // initial paint matches the default hidden input value

    // ---- Mystery recommendation flow ----
    let currentMystery = null; // { book, isStretch, cover }

    async function openMysteryRecommendation() {
      const dlg = document.getElementById('mysteryModal');
      document.getElementById('mysteryContent').innerHTML = '<div class="search-status">picking a book…</div>';
      document.getElementById('addMysteryBtn').disabled = true;
      document.getElementById('tryAnotherBtn').disabled = true;
      dlg.showModal();
      await pickAndRenderMystery();
    }

    async function pickAndRenderMystery() {
      // Profile is built from FINISHED books in the active profile only.
      const profileBooks = books.filter(b => (b.profile || 'anthony') === activeProfile);
      const finishedBooks = profileBooks.filter(b => (b.status || 'finished') === 'finished');

      // Try Haiku first; fall back to the local classics engine on any failure
      // or when there's too little history to work with.
      let isStretch = false;
      let pick = null;
      try {
        pick = await pickLLMRecommendation(finishedBooks, profileBooks);
      } catch (err) {
        console.warn('[rec] Haiku unavailable, using local engine:', err?.message || err);
      }
      if (!pick) {
        isStretch = shouldStretch();
        pick = pickRecommendation(CLASSICS, finishedBooks, profileBooks, isStretch);
      }

      const contentEl = document.getElementById('mysteryContent');
      if (!pick) {
        contentEl.innerHTML = '<div class="search-status">no more recs — you\'ve covered the whole list. tell me to expand it.</div>';
        return;
      }

      // Pull cover + blurb + page count + year in a single call (cached, so re-rolls are cheap)
      const details   = await fetchBookDetails(pick.title, pick.author);
      const cover     = details?.cover || null;
      const blurb     = truncateText(details?.description, 280);
      const pageCount = details?.pageCount || null;
      const year      = details?.publishedDate ? String(details.publishedDate).substring(0, 4) : null;

      const profile = buildTasteProfile(finishedBooks);
      currentMystery = { book: pick, isStretch, cover };

      const coverHtml = cover ? `<img src="${escapeHtml(cover)}" alt="cover" class="modal-cover" />` : '';
      const yearStr   = year ? ` <span class="opacity-60">(${escapeHtml(year)})</span>` : '';
      const genrePillsHtml = pick.genres.length
        ? `<div class="tag-pills mt-2">${pick.genres.map(g => `<span class="tag-pill">${escapeHtml(g)}</span>`).join('')}</div>`
        : '';

      // Compact meta line: "328 pages · slow burn · long chapters"
      const metaParts = [];
      if (pageCount)           metaParts.push(`${pageCount} pages`);
      if (pick.pace)           metaParts.push(pick.pace.toLowerCase());
      if (pick.chapterLength)  metaParts.push(`${pick.chapterLength.toLowerCase()} chapters`);
      const metaHtml = metaParts.length
        ? `<p class="text-xs opacity-70 mt-2">${escapeHtml(metaParts.join(' · '))}</p>`
        : '';

      const blurbHtml = blurb
        ? `<p class="text-sm leading-relaxed mt-3" style="opacity:.85">${escapeHtml(blurb)}</p>`
        : '';

      const reasoning = pick.source === 'llm' ? pick.reason : reasoningFor(pick, profile, isStretch);

      contentEl.innerHTML = `
        ${coverHtml}
        <h3 class="text-lg font-bold leading-tight">${escapeHtml(pick.title)}</h3>
        <p class="opacity-70 text-sm">${escapeHtml(pick.author)}${yearStr}</p>
        ${genrePillsHtml}
        ${metaHtml}
        <div style="clear:both"></div>
        ${blurbHtml}
        <p class="text-xs opacity-60 mt-3 italic">${escapeHtml(reasoning)}</p>
      `;

      document.getElementById('addMysteryBtn').disabled = false;
      document.getElementById('tryAnotherBtn').disabled = false;
    }

    document.getElementById('tryAnotherBtn').addEventListener('click', () => {
      document.getElementById('mysteryContent').innerHTML = '<div class="search-status">picking another…</div>';
      document.getElementById('addMysteryBtn').disabled = true;
      document.getElementById('tryAnotherBtn').disabled = true;
      pickAndRenderMystery();
    });

    document.getElementById('addMysteryBtn').addEventListener('click', async () => {
      if (!currentMystery || !currentUser) return;
      const { book, cover } = currentMystery;
      const btn = document.getElementById('addMysteryBtn');
      btn.textContent = 'Adding…';
      btn.disabled = true;
      try {
        // Reach back into the details cache (populated by pickAndRenderMystery) for pageCount + year
        const cachedDetails = bookDetailsCache.get(`${book.title.toLowerCase()}|${book.author.toLowerCase()}`) || null;
        const colorIdx = Math.floor(Math.random() * spineColors.length);
        await addDoc(collection(db, BOOKS_PATH), {
          title: book.title,
          author: book.author,
          cover: cover || null,
          pageCount: cachedDetails?.pageCount || null,
          publishedDate: cachedDetails?.publishedDate || null,
          detailsAttempted: true,
          profile: activeProfile,
          status: 'bedside',
          rating: null,
          notes: '',
          // Carry the curated pool's tags so the book is tagged from the start (sort-by-genre works,
          // and these pre-fill the review chips later — all still overridable when you finish it).
          genres: book.genres || [],
          tone: book.tone || [],
          pace: book.pace || null,
          lengthFelt: null,
          chapterLength: book.chapterLength || null,
          spine: spineColors[colorIdx],
          ink: inkColors[colorIdx],
          height: Math.floor(Math.random() * (190 - 140 + 1)) + 140,
          width:  Math.floor(Math.random() * (46  - 30  + 1)) + 30,
          createdAt: serverTimestamp(),
          completedAt: null,
          fromRecommendation: true,
        });
        document.getElementById('mysteryModal').close();
      } catch (err) {
        console.error('mystery save failed', err);
        alert('Save failed — try again.');
      } finally {
        btn.textContent = 'Add to bedside';
        btn.disabled = false;
      }
    });

    // ---- Detail backfill: one-shot per session, fills in cover + pageCount + publishedDate for books that don't have them.
    // Filter is `!b.detailsAttempted` so it catches:
    //   - books that have never been attempted (any new field missing)
    //   - older books that have coverAttempted=true but were added before pageCount support
    // After backfill, detailsAttempted=true means we've taken our shot — never re-fetched, even if fields are null.
    async function backfillMissingDetails() {
      if (!currentUser) return;
      const candidates = books.filter(b => !b.detailsAttempted);
      for (const b of candidates) {
        try {
          const details = await fetchBookDetails(b.title, b.author);
          const update = { detailsAttempted: true };
          if (details?.cover && !b.cover)                 update.cover = details.cover;
          if (details?.pageCount && !b.pageCount)         update.pageCount = details.pageCount;
          if (details?.publishedDate && !b.publishedDate) update.publishedDate = details.publishedDate;
          // Auto-tag missing genres from Google's categories so sort-by-genre works retroactively.
          if (details?.categories && details.categories.length && (!b.genres || b.genres.length === 0)) {
            const mapped = mapGoogleCategoriesToChips(details.categories);
            if (mapped.length) update.genres = mapped;
          }
          await updateDoc(doc(db, BOOKS_PATH, b.id), update);
        } catch (e) {
          console.warn('details backfill failed for', b.title, e);
        }
        // be polite to the API between calls
        await new Promise(r => setTimeout(r, 300));
      }
    }

    // ---- Form submission ----
    document.getElementById('addForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!currentUser) return;

      // Resolve book data from either a search-selection or manual entry
      let title, author, cover, pageCount, publishedDate, googleCategories;
      if (selectedBook) {
        ({ title, author, cover, pageCount, publishedDate, categories: googleCategories } = selectedBook);
      } else {
        title  = document.getElementById('addTitle').value.trim();
        author = document.getElementById('addAuthor').value.trim();
        if (!title || !author) {
          alert('Search for a book above, or fill in title and author manually.');
          return;
        }
        // Manual entry: pull cover + page count + year + categories in one call
        const details = await fetchBookDetails(title, author);
        cover            = details?.cover         || null;
        pageCount        = details?.pageCount     || null;
        publishedDate    = details?.publishedDate || null;
        googleCategories = details?.categories    || [];
      }

      const isEditing = !!document.getElementById('addModal').dataset.editing;

      // Tagged review data — drives the recommendation engine
      let genres        = chipValues('genreChips');
      let pace          = chipValue('paceChips');
      let tone          = chipValues('toneChips');
      let lengthFelt    = chipValue('lengthChips');
      let chapterLength = chipValue('chapterChips');

      // Auto-tag fallbacks for fresh adds where the user left chips untouched (manual entry, mostly —
      // search-flow users already saw pre-filled chips). Curated pool wins; Google categories are the
      // backstop for genre. Either way the user can edit later.
      if (!isEditing) {
        const poolEntry = findInPool(title, author);
        if (poolEntry) {
          if (genres.length === 0)        genres        = poolEntry.genres || [];
          if (tone.length === 0)          tone          = poolEntry.tone   || [];
          if (!pace)                      pace          = poolEntry.pace   || null;
          if (!chapterLength)             chapterLength = poolEntry.chapterLength || null;
        }
        if (genres.length === 0 && googleCategories && googleCategories.length) {
          genres = mapGoogleCategoriesToChips(googleCategories);
        }
      }

      const btn = document.getElementById('saveBookBtn');
      btn.textContent = 'Saving...';
      btn.disabled = true;

      // Read mode set when the modal opened — survives view changes during edit
      const modal = document.getElementById('addModal');
      const modeAtOpen = modal.dataset.mode || 'shelf';
      const editingId = modal.dataset.editing || null;
      const status = modeAtOpen === 'bedside' ? 'bedside'
                   : modeAtOpen === 'reading' ? 'reading'
                   : 'finished';
      const isFinished = status === 'finished';

      // Page count: the form field wins (user can correct Google's value); otherwise fall back to
      // what we fetched, then to the existing book's value when editing.
      const enteredPages = parseInt(document.getElementById('addPageCount').value, 10);
      const existingBook = editingId ? books.find(b => b.id === editingId) : null;
      const finalPageCount = (!isNaN(enteredPages) && enteredPages > 0)
        ? enteredPages
        : (pageCount || existingBook?.pageCount || null);

      // Review fields only make sense for finished books. Bedside/reading get nulled out so we
      // don't store a phantom 5-star rating on a book that hasn't been read.
      const rating = isFinished ? parseFloat(document.getElementById('addRating').value) : null;
      const notes  = document.getElementById('addNotes').value;
      // User-chosen finish date (review forms only). A Date is stored directly; Firestore turns it
      // into a Timestamp. Falls back to "now" when finishing for the first time with no date given.
      const completedDate = isFinished ? parseDateInput(document.getElementById('addCompletedDate').value) : null;

      try {
        if (editingId) {
          // Editing existing — review fields only. Always (re)set completedAt from the chosen date so
          // backdated books land in the right month; fall back to now if it's the first finish.
          const editingBook = books.find(b => b.id === editingId);
          const wasUnfinished = editingBook && (editingBook.status || 'finished') !== 'finished';
          const update = {
            rating, notes, status: 'finished',
            genres, pace, tone, lengthFelt, chapterLength,
            pageCount: finalPageCount,
          };
          if (completedDate)      update.completedAt = completedDate;
          else if (wasUnfinished) update.completedAt = serverTimestamp();
          await updateDoc(doc(db, BOOKS_PATH, editingId), update);
        } else {
          const colorIdx = Math.floor(Math.random() * spineColors.length);
          await addDoc(collection(db, BOOKS_PATH), {
            title, author, rating, notes,
            cover: cover || null,
            pageCount: finalPageCount, publishedDate,
            detailsAttempted: true,
            profile: activeProfile,
            status,
            genres, pace, tone, lengthFelt, chapterLength,
            spine: spineColors[colorIdx],
            ink: inkColors[colorIdx],
            height: Math.floor(Math.random() * (190 - 140 + 1)) + 140, // 140-190px
            width:  Math.floor(Math.random() * (46  - 30  + 1)) + 30,  // 30-46px
            createdAt: serverTimestamp(),
            startedAt:   status === 'reading'  ? serverTimestamp() : null,
            currentPage: status === 'reading'  ? 0 : null,
            completedAt: isFinished ? (completedDate || serverTimestamp()) : null,
          });
        }
        document.getElementById('addModal').close();
      } catch (err) {
        console.error('save failed', err);
        alert('Save failed — try again.');
      } finally {
        btn.textContent = status === 'bedside' ? 'Save to bedside'
                        : status === 'reading' ? 'Start reading'
                        : 'Save to shelf';
        btn.disabled = false;
      }
    });

    // ---- Search/manual/selection wiring ----
    document.getElementById('bookSearch').addEventListener('input', () => {
      const term = document.getElementById('bookSearch').value.trim();
      clearTimeout(searchTimer);
      const resultsEl = document.getElementById('searchResults');
      // Min 4 chars + 500ms debounce keeps quota-spend modest while still feeling responsive.
      if (term.length < 4) { resultsEl.innerHTML = ''; return; }
      searchTimer = setTimeout(() => {
        if (term === lastQuery) return;
        lastQuery = term;
        runBookSearch(term);
      }, 500);
    });
    document.getElementById('bookSearch').addEventListener('keydown', (e) => {
      // don't submit the form on Enter while typing a search
      if (e.key === 'Enter') e.preventDefault();
    });
    document.getElementById('manualEntryLink').addEventListener('click', () => {
      document.getElementById('searchSection').classList.add('hidden');
      document.getElementById('manualSection').classList.remove('hidden');
      setTimeout(() => document.getElementById('addTitle').focus(), 50);
    });
    document.getElementById('changeSelection').addEventListener('click', () => {
      selectedBook = null;
      // Reset chips + rating + notes since they were pre-populated for the previous book
      clearAllChips();
      setRating(5);
      document.getElementById('addNotes').value = '';
      document.getElementById('selectedSection').classList.add('hidden');
      document.getElementById('searchSection').classList.remove('hidden');
      setTimeout(() => document.getElementById('bookSearch').focus(), 50);
    });
    // Reset on every close (cancel button, Escape key, or after save)
    document.getElementById('addModal').addEventListener('close', resetAddForm);

    // Rendering Logic
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
    }

    // Returns HTML for five half-fillable star glyphs (supports ratings like 4.5).
    function stars(n) {
      const v = Math.max(0, Math.min(5, Number(n) || 0));
      let html = '';
      for (let i = 1; i <= 5; i++) {
        const fill = v >= i ? 100 : (v >= i - 0.5 ? 50 : 0);
        html += `<span class="star-glyph"><i style="width:${fill}%"></i></span>`;
      }
      return html;
    }

    function chunk(arr, n) {
      const out = [];
      for (let i = 0; i < arr.length; i += n) out.push(arr.slice(i, i + n));
      return out;
    }

    // ---- Sort + author-filter helpers (Shelf only) ----
    // Firestore Timestamps expose toMillis() — fall back to .seconds if not available, or 0.
    function tsMillis(ts) {
      if (!ts) return 0;
      if (typeof ts.toMillis === 'function') return ts.toMillis();
      if (typeof ts.seconds === 'number') return ts.seconds * 1000;
      return 0;
    }
    // Group books into labelled sections that depend on the active sort. Returns an ordered array
    // of { label, books } — each section becomes a divider + one or more shelves. The chosen sort
    // decides the grouping (months / authors / genres / page-bands) and the order within.
    const recencyMs = b => tsMillis(b.completedAt || b.createdAt);
    function buildSections(list, sortKey) {
      const sections = new Map(); // key -> { label, ord, books }
      const add = (key, label, ord, b) => {
        if (!sections.has(key)) sections.set(key, { label, ord, books: [] });
        sections.get(key).books.push(b);
      };

      for (const b of list) {
        if (sortKey === 'author') {
          const a = (b.author || '').trim() || 'Unknown author';
          add('a:' + a.toLowerCase(), a, a.toLowerCase(), b);
        } else if (sortKey === 'genre') {
          const g = (b.genres && b.genres[0]) || '';
          // '~' sorts after letters, so untagged lands last.
          add('g:' + (g || '~'), g || 'Untagged', (g || '~~~').toLowerCase(), b);
        } else if (sortKey === 'length') {
          const pc = b.pageCount;
          if (pc == null) { add('len:none', 'Unknown length', Infinity, b); }
          else {
            const band = Math.floor(pc / 100);
            const label = band === 0 ? 'Under 100 pages' : `${band * 100}\u2013${band * 100 + 99} pages`;
            add('len:' + band, label, band, b);
          }
        } else { // 'completed' — group by finish month, newest first
          const ms = recencyMs(b);
          if (!ms) { add('m:none', 'Undated', Infinity, b); }
          else {
            const d = new Date(ms);
            const label = d.toLocaleDateString(undefined, { month: 'long', year: 'numeric' });
            add('m:' + d.getFullYear() + '-' + d.getMonth(), label, -(d.getFullYear() * 12 + d.getMonth()), b);
          }
        }
      }

      const arr = [...sections.values()];
      const isText = (sortKey === 'author' || sortKey === 'genre');
      arr.sort((a, b) => isText ? String(a.ord).localeCompare(String(b.ord)) : (a.ord - b.ord));
      for (const sec of arr) {
        if (sortKey === 'length') sec.books.sort((x, y) => (x.pageCount || 0) - (y.pageCount || 0));
        else sec.books.sort((x, y) => recencyMs(y) - recencyMs(x));
      }
      return arr;
    }

    // How wide a book renders on the shelf — must match what makeBookEl actually sets.
    function bookDisplayWidth(b) {
      return b.cover
        ? Math.round((b.height || 160) * 0.66)
        : Math.max(b.width || 38, 36); // floor keeps vertical spine titles legible
    }

    // Sentinel for the "+" empty slot — packed alongside books so it always sits next to the last one.
    const SLOT_ITEM = Object.freeze({ isSlot: true, width: 38 });
    // Sentinel for the mystery "?" tile — only appears on the Bedside (recommendation engine entry point)
    const MYSTERY_ITEM = Object.freeze({ isMystery: true, width: 100, height: 160 });

    // Pack a list of items (books + slot + mystery) into shelf rows that fit the container width.
    // Each output row will be its own shelf section (with its own plank).
    function packIntoRows(items, containerWidth) {
      const gap = 6;
      const padding = 28; // .shelf-row left + right padding (14 + 14)
      const available = Math.max(80, containerWidth - padding);
      const rows = [];
      let current = [];
      let curWidth = 0;
      for (const item of items) {
        const w = (item.isSlot || item.isMystery) ? item.width : bookDisplayWidth(item);
        const widthWithGap = current.length > 0 ? gap + w : w;
        if (curWidth + widthWithGap > available && current.length > 0) {
          rows.push(current);
          current = [];
          curWidth = 0;
        }
        current.push(item);
        curWidth += current.length === 1 ? w : (gap + w);
      }
      if (current.length > 0) rows.push(current);
      return rows;
    }

    // ---- Currently-reading strip (shown above the Shelf only) ----
    function relativeSince(ts) {
      const ms = tsMillis(ts);
      if (!ms) return '';
      const days = Math.floor((Date.now() - ms) / 86400000);
      if (days <= 0) return 'started today';
      if (days === 1) return 'started yesterday';
      if (days < 7)  return `reading for ${days} days`;
      const weeks = Math.floor(days / 7);
      return weeks === 1 ? 'reading for a week' : `reading for ${weeks} weeks`;
    }

    function renderReadingStrip() {
      const strip = document.getElementById('readingStrip');
      const readingBooks = books
        .filter(b => (b.profile || 'anthony') === activeProfile && b.status === 'reading')
        .sort((a, b) => tsMillis(b.startedAt) - tsMillis(a.startedAt));

      // Only ever visible on the Shelf. On the Bedside it's hidden via CSS, but we also skip
      // building it there to avoid needless DOM churn.
      if (activeView !== 'bookshelf') { strip.classList.add('hidden'); strip.innerHTML = ''; return; }
      strip.classList.remove('hidden');

      const row = document.createElement('div');
      row.className = 'reading-row';

      readingBooks.forEach(b => {
        const card = document.createElement('button');
        card.type = 'button';
        card.className = 'reading-card';
        card.setAttribute('aria-label', `Currently reading ${b.title} by ${b.author}`);
        const coverHtml = b.cover
          ? `<img src="${escapeHtml(b.cover)}" class="reading-card-cover" alt="">`
          : `<span class="reading-card-cover-fallback" style="background:${escapeHtml(b.spine || '#4a3b6b')}"></span>`;
        // With a known page count, show a progress bar + page line; otherwise fall back to "started …".
        const pc = b.pageCount || 0;
        const cur = b.currentPage || 0;
        const pct = pc ? Math.min(100, Math.round(cur / pc * 100)) : 0;
        const footHtml = pc
          ? `<span class="reading-progress">
               <span class="reading-bar-row">
                 <span class="reading-bar"><span style="width:${pct}%"></span></span>
                 <span class="reading-pct">${pct}%</span>
               </span>
               <span class="reading-page">${cur ? `page ${cur} of ${pc} · tap to update` : `${pc} pages · tap to set your page`}</span>
             </span>`
          : `<span class="reading-card-since">${escapeHtml(relativeSince(b.startedAt))} · tap to add pages</span>`;
        card.innerHTML = `
          ${coverHtml}
          <span class="reading-card-meta">
            <span class="reading-card-title">${escapeHtml(b.title)}</span>
            <span class="reading-card-author">${escapeHtml(b.author)}</span>
            ${footHtml}
          </span>`;
        card.addEventListener('click', () => openBook(b));
        row.appendChild(card);
      });

      // Trailing "start a book" affordance
      const add = document.createElement('button');
      add.type = 'button';
      add.className = 'reading-card';
      add.style.alignItems = 'center';
      add.style.justifyContent = 'center';
      add.style.width = '130px';
      add.style.opacity = '0.75';
      add.setAttribute('aria-label', 'Start reading a book');
      add.innerHTML = `<span style="font-size:13px">+ start a book</span>`;
      add.addEventListener('click', () => openAddModal('reading'));
      row.appendChild(add);

      const heading = readingBooks.length ? 'Currently reading' : 'Start reading';
      strip.innerHTML = `<h2>${heading}</h2>`;
      strip.appendChild(row);
    }

    // Build one shelf <section> (a row of items + its plank) from a packed row of items.
    function buildShelfEl(rowItems) {
      const shelf = document.createElement('section');
      shelf.className = 'shelf';
      const list = document.createElement('div');
      list.className = 'shelf-row';
      rowItems.forEach(item => {
        if (item.isSlot) {
          const slot = document.createElement('button');
          slot.type = 'button';
          slot.className = 'empty-slot';
          slot.setAttribute('aria-label', 'Add a book');
          slot.textContent = '+';
          slot.addEventListener('click', () => openAddModal());
          list.appendChild(slot);
        } else if (item.isMystery) {
          const myst = document.createElement('button');
          myst.type = 'button';
          myst.className = 'book book-mystery';
          myst.style.width = item.width + 'px';
          myst.style.minHeight = item.height + 'px';
          myst.setAttribute('aria-label', 'A mystery recommendation');
          myst.textContent = '?';
          myst.addEventListener('click', openMysteryRecommendation);
          list.appendChild(myst);
        } else {
          list.appendChild(makeBookEl(item));
        }
      });
      const plank = document.createElement('div');
      plank.className = 'shelf-plank';
      shelf.appendChild(list);
      shelf.appendChild(plank);
      return shelf;
    }

    function renderShelves() {
      renderReadingStrip();
      const root = document.getElementById('shelves');
      root.innerHTML = '';

      // Filter by active profile AND active view.
      // Legacy: books without a profile default to 'anthony'; books without a status default to 'finished' (on the Shelf).
      const expectedStatus = activeView === 'bedside' ? 'bedside' : 'finished';
      const visibleBooks = books.filter(b =>
        (b.profile || 'anthony') === activeProfile &&
        (b.status  || 'finished') === expectedStatus
      );

      const containerWidth = root.clientWidth || 460;

      // Bedside keeps the mystery "?" tile pinned on its own shelf at the very top.
      if (activeView === 'bedside') {
        root.appendChild(buildShelfEl([MYSTERY_ITEM]));
      }

      const sections = buildSections(visibleBooks, activeSort);

      if (sections.length === 0) {
        // Nothing here yet — show a single shelf with just the "+" so it's not blank.
        root.appendChild(buildShelfEl([SLOT_ITEM]));
        return;
      }

      sections.forEach((sec, si) => {
        const label = document.createElement('div');
        label.className = 'section-label';
        label.textContent = sec.label;
        root.appendChild(label);

        // Append the "+" slot only after the very last section's books.
        const items = (si === sections.length - 1) ? [...sec.books, SLOT_ITEM] : [...sec.books];
        packIntoRows(items, containerWidth).forEach(row => root.appendChild(buildShelfEl(row)));
      });
    }

    function makeBookEl(b) {
      const el = document.createElement('button');
      el.type = 'button';
      el.className = 'book';
      el.style.minHeight = (b.height || 160) + 'px';
      // Rating only exists for finished books — don't announce "rated null of 5" for bedside titles.
      el.setAttribute('aria-label', b.rating
        ? `${b.title} by ${b.author}, rated ${b.rating} of 5`
        : `${b.title} by ${b.author}`);
      el.addEventListener('click', () => openBook(b));

      if (b.cover) {
        // Face-out: show the cover art. Width ≈ 2/3 of height (standard book aspect).
        el.classList.add('book-face');
        el.style.width = Math.round((b.height || 160) * 0.66) + 'px';
        // JSON.stringify safely quotes the URL for use in CSS url()
        el.style.backgroundImage = `url(${JSON.stringify(b.cover)})`;
        el.title = `${b.title} — ${b.author}`;
      } else {
        // Spine-out fallback: coloured spine with vertical title text.
        el.classList.add('book-spine');
        el.style.background = `linear-gradient(90deg, ${b.spine} 0%, ${b.spine} 65%, rgba(0,0,0,0.18) 100%)`;
        el.style.color = b.ink;
        el.style.width = Math.max(b.width || 38, 36) + 'px';
        el.textContent = b.title;
      }
      return el;
    }

    // ---- Status transitions ----
    async function startReading(b) {
      if (!currentUser) return;
      await updateDoc(doc(db, BOOKS_PATH, b.id), {
        status: 'reading',
        startedAt: serverTimestamp(),
        currentPage: b.currentPage || 0,
      });
    }
    async function moveToBedside(b) {
      if (!currentUser) return;
      await updateDoc(doc(db, BOOKS_PATH, b.id), {
        status: 'bedside',
        startedAt: null,
        currentPage: null,
      });
    }

    function openBook(b) {
      const dlg = document.getElementById('bookModal');
      const c = document.getElementById('modalContent');
      const cover = b.cover
        ? `<img src="${escapeHtml(b.cover)}" alt="cover of ${escapeHtml(b.title)}" class="modal-cover" />`
        : '';

      const status     = b.status || 'finished';
      const isBedside  = status === 'bedside';
      const isReading  = status === 'reading';
      const isFinished = status === 'finished';

      // Review tags — only shown for finished books (unfinished ones aren't reviewed yet)
      const tags = !isFinished ? [] : [
        ...(b.genres || []),
        ...(b.pace ? [b.pace] : []),
        ...(b.tone || []),
        ...(b.lengthFelt ? [b.lengthFelt] : []),
        ...(b.chapterLength ? [`${b.chapterLength} chapters`] : []),
      ];
      const tagsHtml = tags.length
        ? `<div class="tag-pills">${tags.map(t => `<span class="tag-pill">${escapeHtml(t)}</span>`).join('')}</div>`
        : '';

      // Stars for finished books; a status line for unfinished ones.
      let statusBlock;
      if (isFinished) {
        const finMs = tsMillis(b.completedAt || b.createdAt);
        const finStr = finMs
          ? new Date(finMs).toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' })
          : '';
        const finLine = finStr ? `<p class="text-xs opacity-50 mb-2">finished ${escapeHtml(finStr)}</p>` : '';
        statusBlock = `<p class="stars text-lg mb-1" aria-label="rating ${b.rating || 0} of 5">${stars(b.rating || 0)}</p>${finLine}`;
      } else if (isReading) {
        const since = relativeSince(b.startedAt);
        statusBlock = `
          <p class="text-xs italic opacity-60 mb-1">— currently reading${since ? ' · ' + escapeHtml(since) : ''} —</p>
          <div id="readingControls"></div>`;
      } else {
        statusBlock = `<p class="text-xs italic opacity-60 mb-2">— on your bedside —</p>`;
      }

      // "no notes yet" only shown for finished books — unfinished books just might not have notes
      const notesHtml = b.notes
        ? `<p class="text-sm leading-relaxed">${escapeHtml(b.notes)}</p>`
        : (isFinished ? '<p class="text-sm leading-relaxed"><em class="opacity-60">no notes yet</em></p>' : '');

      // Primary actions above the divider, by status.
      let primaryBlock = '';
      if (isBedside) {
        primaryBlock = `
          <button type="button" id="startReadingBtn" class="btn-wood mt-4">Start reading</button>
          <button type="button" id="finishedNowBtn" class="block w-full text-center mt-2 text-sm underline opacity-70">I've already finished it</button>`;
      } else if (isReading) {
        primaryBlock = `
          <button type="button" id="finishedBtn" class="btn-wood mt-4">I've finished this</button>
          <button type="button" id="backToBedsideBtn" class="block w-full text-center mt-2 text-sm underline opacity-70">Back to bedside</button>`;
      }

      const deleteLabel = isFinished ? 'Delete book' : (isBedside ? 'Remove from bedside' : 'Remove book');
      // Finished books get a small "Edit review" link next to delete.
      const editLink = isFinished
        ? `<button type="button" id="editBookBtn" class="text-[#5d4a82] text-sm font-semibold opacity-80 hover:opacity-100">Edit review</button>`
        : '';
      const actionRowJustify = isFinished ? 'justify-between' : 'justify-end';

      c.innerHTML = `
        ${cover}
        <h2 id="modalTitle" class="text-xl font-bold leading-tight">${escapeHtml(b.title)}</h2>
        <p class="opacity-70 text-sm mb-2">${escapeHtml(b.author)}</p>
        ${statusBlock}
        ${tagsHtml}
        ${notesHtml}
        <div style="clear:both"></div>
        ${primaryBlock}
        <div class="mt-6 pt-4 border-t border-[rgba(59,36,24,.1)] flex ${actionRowJustify} items-center">
          ${editLink}
          <button type="button" id="deleteBookBtn" class="text-[#8b3a3a] text-sm font-semibold opacity-80 hover:opacity-100">${deleteLabel}</button>
        </div>
      `;

      // Delete / remove
      document.getElementById('deleteBookBtn').addEventListener('click', async () => {
        const confirmMsg = isFinished
          ? `Are you sure you want to remove "${b.title}" from your shelf?`
          : `Remove "${b.title}"?`;
        if (confirm(confirmMsg)) {
          const btn = document.getElementById('deleteBookBtn');
          btn.textContent = 'Removing...';
          btn.disabled = true;
          await deleteDoc(doc(db, BOOKS_PATH, b.id));
          dlg.close();
        }
      });

      if (isBedside) {
        document.getElementById('startReadingBtn').addEventListener('click', async () => {
          await startReading(b);
          dlg.close();
        });
        document.getElementById('finishedNowBtn').addEventListener('click', () => {
          dlg.close();
          openAddModalForEdit(b);
        });
      } else if (isReading) {
        document.getElementById('finishedBtn').addEventListener('click', () => {
          dlg.close();
          openAddModalForEdit(b);
        });
        document.getElementById('backToBedsideBtn').addEventListener('click', async () => {
          await moveToBedside(b);
          dlg.close();
        });

        // Reading progress: current page + an editable total (Google Books often omits the page
        // count for some editions, so you can type it in here). Each saves on change and re-renders
        // so the bar updates live. We mutate the local `b` for instant feedback.
        const renderReadingControls = () => {
          const wrap = document.getElementById('readingControls');
          const pc = b.pageCount || 0;
          const cur = b.currentPage || 0;
          const pct = pc ? Math.min(100, Math.round(cur / pc * 100)) : 0;
          wrap.innerHTML = `
            ${pc ? `<div class="reading-bar" style="margin:8px 0 7px"><span style="width:${pct}%"></span></div>` : ''}
            <div class="flex items-center gap-2 text-sm mb-1">
              <label class="opacity-70" for="curPageInput">page</label>
              <input type="number" id="curPageInput" min="0" ${pc ? `max="${pc}"` : ''} value="${cur || ''}" placeholder="0"
                     class="w-16 p-1 border rounded bg-[var(--paper)] text-[var(--ink)]" />
              <span class="opacity-70">of</span>
              <input type="number" id="totPageInput" min="1" value="${pc || ''}" placeholder="?"
                     class="w-16 p-1 border rounded bg-[var(--paper)] text-[var(--ink)]" />
              <span class="opacity-60">pages</span>
            </div>
            ${pc ? '' : '<p class="text-xs opacity-50">add the total pages to track progress</p>'}`;

          wrap.querySelector('#curPageInput').addEventListener('change', async (e) => {
            let v = parseInt(e.target.value, 10);
            if (isNaN(v) || v < 0) v = 0;
            if (b.pageCount && v > b.pageCount) v = b.pageCount;
            b.currentPage = v;
            await updateDoc(doc(db, BOOKS_PATH, b.id), { currentPage: v });
            renderReadingControls();
          });
          wrap.querySelector('#totPageInput').addEventListener('change', async (e) => {
            let v = parseInt(e.target.value, 10);
            if (isNaN(v) || v <= 0) v = null;
            const update = { pageCount: v };
            b.pageCount = v;
            if (v && (b.currentPage || 0) > v) { b.currentPage = v; update.currentPage = v; }
            await updateDoc(doc(db, BOOKS_PATH, b.id), update);
            renderReadingControls();
          });
        };
        renderReadingControls();
      } else {
        document.getElementById('editBookBtn').addEventListener('click', () => {
          dlg.close();
          openAddModalForEdit(b);
        });
      }

      dlg.showModal();
    }

    document.getElementById('addBtn').addEventListener('click', openAddModal);

    // Profile chip — tap to swap between anthony and amy (per-device, persisted in localStorage).
    document.getElementById('profileBtn').addEventListener('click', () => {
      if (!currentUser) return; // ignore taps while still signing in
      setActiveProfile(activeProfile === 'anthony' ? 'amy' : 'anthony');
    });

    // View toggle — one button that swaps between Shelf and Bedside (the wall colour tells you
    // which one you're on, so the label points where you'd go next).
    document.getElementById('viewToggle').addEventListener('click', () => {
      setActiveView(activeView === 'bedside' ? 'bookshelf' : 'bedside');
    });
    // Initial activation: sets the toggle label + subtitle and paints the view.
    setActiveView(activeView);

    // Sort select — syncs to saved value, then wires the change handler.
    document.getElementById('sortSelect').value = activeSort;
    document.getElementById('sortSelect').addEventListener('change', e => setActiveSort(e.target.value));

    // ---- Stats ----
    // All derived live from the active profile's finished books. completedAt falls back to createdAt
    // for books added before completedAt stamping existed.
    function computeStats() {
      const finished = books.filter(b =>
        (b.profile || 'anthony') === activeProfile && (b.status || 'finished') === 'finished');
      const now = new Date();
      const yearStart  = new Date(now.getFullYear(), 0, 1).getTime();
      const monthStart = new Date(now.getFullYear(), now.getMonth(), 1).getTime();
      const completedMs = b => tsMillis(b.completedAt || b.createdAt);

      const totalBooks = finished.length;
      const totalPages = finished.reduce((s, b) => s + (b.pageCount || 0), 0);
      const thisYear   = finished.filter(b => completedMs(b) >= yearStart).length;
      const rated      = finished.filter(b => b.rating);
      const avgRating  = rated.length ? rated.reduce((s, b) => s + b.rating, 0) / rated.length : 0;
      const pagedBooks = finished.filter(b => b.pageCount);
      const avgPages   = pagedBooks.length ? Math.round(totalPages / pagedBooks.length) : 0;

      const genreCounts = {};
      finished.forEach(b => (b.genres || []).forEach(g => { genreCounts[g] = (genreCounts[g] || 0) + 1; }));
      const topGenres = Object.entries(genreCounts).sort((a, b) => b[1] - a[1]).slice(0, 6);

      // Books finished per month over the trailing 12 months.
      const months = [];
      for (let i = 11; i >= 0; i--) {
        const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
        months.push({ label: d.toLocaleString(undefined, { month: 'short' }), key: `${d.getFullYear()}-${d.getMonth()}`, count: 0 });
      }
      const monthIndex = new Map(months.map((m, i) => [m.key, i]));
      finished.forEach(b => {
        const ms = completedMs(b);
        if (!ms) return;
        const d = new Date(ms);
        const key = `${d.getFullYear()}-${d.getMonth()}`;
        if (monthIndex.has(key)) months[monthIndex.get(key)].count++;
      });

      // Average days to finish, for books with both startedAt and completedAt.
      const durations = finished
        .map(b => { const s = tsMillis(b.startedAt), c = tsMillis(b.completedAt); return (s && c && c >= s) ? Math.round((c - s) / 86400000) : null; })
        .filter(d => d != null);
      const avgDays = durations.length ? Math.round(durations.reduce((a, b) => a + b, 0) / durations.length) : null;

      return { totalBooks, totalPages, thisYear, avgRating, avgPages, topGenres, months, avgDays };
    }

    function renderStats() {
      const s = computeStats();
      const el = document.getElementById('statsContent');
      if (s.totalBooks === 0) {
        el.innerHTML = `<p class="stats-empty">No finished books yet — once you review a few, your reading takes shape here.</p>`;
        return;
      }
      const card = (num, label) => `<div class="stat-card"><div class="stat-num">${num}</div><div class="stat-label">${escapeHtml(label)}</div></div>`;
      const maxGenre = Math.max(1, ...s.topGenres.map(g => g[1]));
      const genreBars = s.topGenres.map(([g, n]) => `
        <div class="bar-row">
          <span class="bar-label" title="${escapeHtml(g)}">${escapeHtml(g)}</span>
          <span class="bar-track"><span class="bar-fill" style="width:${Math.round(n / maxGenre * 100)}%"></span></span>
          <span class="bar-value">${n}</span>
        </div>`).join('');
      const maxMonth = Math.max(1, ...s.months.map(m => m.count));
      const monthBars = s.months.map(m => `
        <div class="month-bar-wrap" title="${escapeHtml(m.label)}: ${m.count}">
          <div class="month-bar" style="height:${Math.round(m.count / maxMonth * 100)}%"></div>
          <div class="month-bar-label">${escapeHtml(m.label[0])}</div>
        </div>`).join('');

      el.innerHTML = `
        <div class="stat-grid">
          ${card(s.totalBooks, 'books finished')}
          ${card(s.thisYear, 'finished this year')}
          ${card(s.totalPages.toLocaleString(), 'pages read')}
          ${card(s.avgRating ? s.avgRating.toFixed(1) + '★' : '–', 'average rating')}
          ${card(s.avgPages || '–', 'avg pages / book')}
          ${card(s.avgDays != null ? s.avgDays + 'd' : '–', 'avg days to finish')}
        </div>
        <div class="stat-section-label">Finished per month</div>
        <div class="month-chart">${monthBars}</div>
        <div class="stat-section-label">Top genres</div>
        ${genreBars || '<p class="stats-empty">No genres tagged yet.</p>'}
      `;
    }
    document.getElementById('statsBtn').addEventListener('click', () => {
      renderStats();
      document.getElementById('statsModal').showModal();
    });

    // ---- Backup: export / import ----
    // Export every book on this device (all profiles) so a restore is complete. Firestore Timestamps
    // are normalised to ISO strings so the JSON is portable and re-importable.
    function exportBackup() {
      const toIso = ts => { const ms = tsMillis(ts); return ms ? new Date(ms).toISOString() : null; };
      const payload = {
        app: 'bookshelf',
        version: 1,
        exportedAt: new Date().toISOString(),
        books: books.map(({ id, createdAt, startedAt, completedAt, ...rest }) => ({
          ...rest,
          createdAt:   toIso(createdAt),
          startedAt:   toIso(startedAt),
          completedAt: toIso(completedAt),
        })),
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `bookshelf-backup-${new Date().toISOString().slice(0, 10)}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    async function importBackup(file) {
      if (!file || !currentUser) return;
      let payload;
      try { payload = JSON.parse(await file.text()); }
      catch { alert('That file is not valid JSON.'); return; }
      const list = Array.isArray(payload) ? payload : payload.books;
      if (!Array.isArray(list) || list.length === 0) { alert('No books found in that backup.'); return; }
      if (!confirm(`Import ${list.length} book(s) onto this device? They'll be added to your shelf; exact duplicates are skipped.`)) return;

      // Dedupe against what's already here (title|author|profile), and within the file itself.
      const existing = new Set(books.map(b => `${(b.title || '').toLowerCase()}|${(b.author || '').toLowerCase()}|${b.profile || 'anthony'}`));
      const toDate = v => (v ? new Date(v) : null);
      let added = 0, skipped = 0;

      for (const part of chunk(list, 400)) { // Firestore batches cap at 500 writes
        const batch = writeBatch(db);
        let writes = 0;
        for (const raw of part) {
          if (!raw || !raw.title || !raw.author) { skipped++; continue; }
          const profile = PROFILES.includes(raw.profile) ? raw.profile : 'anthony';
          const key = `${raw.title.toLowerCase()}|${raw.author.toLowerCase()}|${profile}`;
          if (existing.has(key)) { skipped++; continue; }
          existing.add(key);
          const colorIdx = Math.floor(Math.random() * spineColors.length);
          const ref = doc(collection(db, BOOKS_PATH));
          batch.set(ref, {
            title: raw.title, author: raw.author,
            cover: raw.cover || null,
            rating: raw.rating ?? null,
            notes: raw.notes || '',
            genres: Array.isArray(raw.genres) ? raw.genres : [],
            tone:   Array.isArray(raw.tone)   ? raw.tone   : [],
            pace: raw.pace || null,
            lengthFelt: raw.lengthFelt || null,
            chapterLength: raw.chapterLength || null,
            pageCount: raw.pageCount || null,
            publishedDate: raw.publishedDate || null,
            status: raw.status || 'finished',
            currentPage: raw.currentPage ?? null,
            profile,
            detailsAttempted: raw.detailsAttempted ?? true,
            fromRecommendation: raw.fromRecommendation || false,
            spine: raw.spine || spineColors[colorIdx],
            ink:   raw.ink   || inkColors[colorIdx],
            height: raw.height || (Math.floor(Math.random() * (190 - 140 + 1)) + 140),
            width:  raw.width  || (Math.floor(Math.random() * (46  - 30  + 1)) + 30),
            createdAt:   toDate(raw.createdAt) || serverTimestamp(),
            startedAt:   toDate(raw.startedAt),
            completedAt: toDate(raw.completedAt),
          });
          added++; writes++;
        }
        if (writes > 0) await batch.commit();
      }
      alert(`Imported ${added} book(s)${skipped ? `, skipped ${skipped} (duplicate or invalid)` : ''}.`);
    }

    document.getElementById('exportBtn').addEventListener('click', exportBackup);
    document.getElementById('importBtn').addEventListener('click', () => document.getElementById('importFile').click());
    document.getElementById('importFile').addEventListener('change', (e) => {
      const file = e.target.files && e.target.files[0];
      e.target.value = ''; // let the same file be re-selected later
      importBackup(file);
    });

    // Re-pack shelves when the container width changes (window resize, phone rotation).
    // Debounced so a drag-resize doesn't fire on every pixel.
    let lastShelfWidth = 0;
    let shelfResizeTimer = null;
    const shelvesRoot = document.getElementById('shelves');
    new ResizeObserver(entries => {
      const w = entries[0].contentRect.width;
      if (Math.abs(w - lastShelfWidth) < 4) return; // ignore sub-pixel jitter
      clearTimeout(shelfResizeTimer);
      shelfResizeTimer = setTimeout(() => {
        lastShelfWidth = w;
        renderShelves();
      }, 150);
    }).observe(shelvesRoot);

    // ---- service worker registration ----
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err => console.warn('SW register failed:', err));
      });
    }
  </script>
</body>
