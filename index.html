<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#3b2418" />
  <meta name="description" content="A personal digital bookshelf — finished books look better on a shelf." />
  <title>Bookshelf</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" sizes="192x192" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --paper: #f4ecd8;
      --paper-shade: #e9dcc0;
      --ink: #3b2418;
      --wood-light: #6b4226;
      --wood-mid: #4a2c1a;
      --wood-dark: #2e1c10;
      --accent: #8b3a3a;
    }
    html, body { background: var(--paper); color: var(--ink); }
    body {
      font-family: ui-serif, Georgia, "Times New Roman", serif;
      background:
        repeating-linear-gradient(0deg, transparent 0 22px, rgba(59,36,24,.04) 22px 23px),
        linear-gradient(180deg, var(--paper), var(--paper-shade));
      min-height: 100vh;
      min-height: 100dvh;
    }
    h1, h2 { font-family: ui-serif, "Iowan Old Style", Georgia, serif; }

    /* ---------- bookcase ---------- */
    .shelf { position: relative; padding-bottom: 18px; }
    .shelf-row {
      display: flex; align-items: flex-end; gap: 6px;
      padding: 6px 14px 0 14px;
      min-height: 200px;
    }
    .shelf-plank {
      height: 16px;
      background: linear-gradient(180deg, var(--wood-light) 0%, var(--wood-mid) 55%, var(--wood-dark) 100%);
      box-shadow: 0 6px 8px -2px rgba(0,0,0,.30), inset 0 1px 0 rgba(255,255,255,.12), inset 0 -2px 0 rgba(0,0,0,.25);
      border-radius: 2px 2px 5px 5px;
    }

    /* ---------- book (shared base) ---------- */
    .book {
      flex: 0 0 auto; min-height: 150px; border-radius: 3px 3px 1px 1px;
      cursor: pointer; color: inherit; border: none; overflow: hidden;
      background-size: cover; background-position: center;
      background-color: var(--paper-shade);
      font-family: ui-serif, Georgia, serif;
      transition: transform .15s ease, box-shadow .15s ease; will-change: transform;
      box-shadow: 2px 3px 4px rgba(0,0,0,.20);
    }
    .book:hover, .book:focus-visible {
      transform: translateY(-8px); outline: none;
      box-shadow: 2px 8px 10px rgba(0,0,0,.25);
    }

    /* Spine-out — fallback for books without a cover: coloured spine + vertical title */
    .book.book-spine {
      writing-mode: vertical-rl; text-orientation: mixed;
      padding: 10px 4px; line-height: 1.1;
      font-size: 11px; font-weight: 600; letter-spacing: 0.04em;
      text-overflow: ellipsis; white-space: nowrap;
      box-shadow:
        inset -3px 0 0 rgba(0,0,0,.22),
        inset 3px 0 0 rgba(255,255,255,.10),
        2px 3px 4px rgba(0,0,0,.20);
    }
    .book.book-spine:hover, .book.book-spine:focus-visible {
      box-shadow:
        inset -3px 0 0 rgba(0,0,0,.22),
        inset 3px 0 0 rgba(255,255,255,.10),
        2px 8px 10px rgba(0,0,0,.25);
    }

    /* Face-out — books with a cover: cover art shown as background. Width set inline (≈2/3 of height). */
    .book.book-face { /* width comes from JS */ }

    /* Mystery "?" tile — appears on the Bedside only, taps to surface a recommendation */
    .book.book-mystery {
      background: linear-gradient(135deg, #2e1b4a, #4a3b6b 45%, #6b4a8d 100%);
      color: #f4ecd8;
      display: flex; align-items: center; justify-content: center;
      font-size: 54px; font-weight: 700;
      font-family: ui-serif, Georgia, "Times New Roman", serif;
      text-shadow: 0 0 14px rgba(255,255,255,.18);
      position: relative;
    }
    .book.book-mystery::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(circle at 30% 25%, rgba(255,255,255,.12), transparent 55%);
      pointer-events: none;
    }

    .book:nth-child(4n) { transform: rotate(-1.2deg); }
    .book:nth-child(7n) { transform: rotate(1.4deg); }
    .book:nth-child(4n):hover, .book:nth-child(4n):focus-visible,
    .book:nth-child(7n):hover, .book:nth-child(7n):focus-visible { transform: translateY(-8px); }

    /* ---------- empty slot placeholder ---------- */
    .empty-slot {
      flex: 0 0 auto; width: 38px; min-height: 150px; border: 1.5px dashed rgba(59,36,24,.25);
      border-radius: 3px; color: rgba(59,36,24,.45); display: flex; align-items: center;
      justify-content: center; font-size: 22px; background: transparent; cursor: pointer;
    }
    .empty-slot:hover { background: rgba(59,36,24,.04); color: var(--ink); }

    /* ---------- floating add button ---------- */
    .fab {
      position: fixed; bottom: max(16px, env(safe-area-inset-bottom)); right: 16px;
      width: 56px; height: 56px; border-radius: 50%; background: var(--wood-mid);
      color: var(--paper); font-size: 30px; line-height: 1; box-shadow: 0 8px 16px rgba(0,0,0,.25);
      border: none; cursor: pointer;
    }
    .fab:active { transform: translateY(1px); }

    /* ---------- modal ---------- */
    dialog {
      border: none; padding: 0; border-radius: 14px; background: var(--paper);
      color: var(--ink); width: min(92vw, 460px); box-shadow: 0 20px 60px rgba(0,0,0,.35);
    }
    dialog::backdrop { background: rgba(0,0,0,.45); }
    .modal-inner { padding: 20px 22px 22px; }
    .modal-cover {
      float: left; width: 110px; height: 165px; margin: 0 14px 8px 0;
      border-radius: 4px; box-shadow: 0 6px 10px rgba(0,0,0,.25); object-fit: cover; background: var(--paper-shade);
    }
    .stars { color: #c2761b; letter-spacing: 2px; }

    /* Tappable star picker in the add/edit form */
    .star-picker { display: flex; gap: 4px; padding: 4px 0; }
    .star {
      background: transparent; border: none; cursor: pointer;
      font-size: 34px; line-height: 1;
      color: rgba(59,36,24,.22);
      padding: 6px 4px; font-family: inherit;
      transition: color .12s ease, transform .12s ease;
    }
    .star:hover, .star:focus-visible { transform: scale(1.18); outline: none; }
    .star.filled { color: #c2761b; }

    .btn-wood {
      width: 100%; padding: 10px 0; border-radius: 8px; background: var(--wood-mid);
      color: var(--paper); border: none; cursor: pointer; font-size: 14px; letter-spacing: 0.04em;
    }
    .btn-wood:disabled { opacity: 0.7; cursor: not-allowed; }

    /* ---------- profile chip ---------- */
    .profile-chip {
      background: rgba(59,36,24,.08); padding: 4px 10px; border-radius: 999px;
      font-size: 12px; letter-spacing: 0.04em; border: 1px solid rgba(59,36,24,.15);
      cursor: pointer; user-select: none;
      transition: background .15s ease, border-color .15s ease, color .15s ease;
    }
    .profile-chip:hover { background: rgba(59,36,24,.14); }
    body[data-profile="amy"] .profile-chip {
      background: rgba(139, 58, 58, .10);
      border-color: rgba(139, 58, 58, .28);
      color: var(--accent);
    }
    body[data-profile="amy"] .profile-chip:hover {
      background: rgba(139, 58, 58, .18);
    }

    input, textarea { border-color: rgba(59,36,24,.2); outline-color: var(--wood-mid); }

    /* ---------- search results in add-book modal ---------- */
    #searchResults { max-height: 18rem; overflow-y: auto; }
    .search-result {
      display: flex; gap: 10px; align-items: flex-start; width: 100%;
      padding: 8px; border: none; background: transparent;
      cursor: pointer; text-align: left; border-radius: 6px;
      transition: background .15s ease;
      color: var(--ink); font-family: inherit;
    }
    .search-result:hover, .search-result:focus-visible {
      background: rgba(59,36,24,.08); outline: none;
    }
    .search-thumb, .search-thumb-fallback {
      width: 36px; height: 54px; border-radius: 3px; flex-shrink: 0;
      background: var(--paper-shade);
      box-shadow: 0 1px 3px rgba(0,0,0,.18);
    }
    .search-thumb { object-fit: cover; }
    .search-meta { flex: 1; min-width: 0; }
    .search-title {
      font-weight: 600; font-size: 14px; line-height: 1.2;
      overflow: hidden; text-overflow: ellipsis;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }
    .search-author {
      font-size: 12px; opacity: 0.7; margin-top: 2px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .search-status { padding: 10px; font-size: 13px; opacity: 0.6; text-align: center; }

    /* ---------- chip groups (review tagging) ---------- */
    .chip-group-label {
      display: block; font-size: 13px; opacity: 0.7; margin-bottom: 6px;
    }
    .chip-group { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      padding: 5px 12px;
      border-radius: 999px;
      border: 1px solid rgba(59,36,24,.22);
      background: transparent;
      color: var(--ink);
      font-size: 13px; font-family: inherit;
      cursor: pointer;
      transition: background .15s ease, border-color .15s ease, color .15s ease;
    }
    .chip:hover { background: rgba(59,36,24,.06); }
    .chip.active {
      background: var(--wood-mid);
      color: var(--paper);
      border-color: var(--wood-mid);
    }

    /* Read-only pills shown in the book detail modal */
    .tag-pills {
      display: flex; flex-wrap: wrap; gap: 5px;
      margin: 6px 0 10px;
    }
    .tag-pill {
      font-size: 11px;
      padding: 2px 9px;
      border-radius: 999px;
      background: rgba(59,36,24,.08);
      border: 1px solid rgba(59,36,24,.15);
      color: var(--ink);
    }

    .selected-card {
      display: flex; gap: 12px; align-items: flex-start;
      padding: 10px; border-radius: 8px;
      border: 1px solid rgba(59,36,24,.15); background: rgba(59,36,24,.04);
    }
    .selected-card img { width: 56px; height: 84px; object-fit: cover; border-radius: 3px; box-shadow: 0 2px 4px rgba(0,0,0,.18); flex-shrink: 0; background: var(--paper-shade); }
    .hidden { display: none !important; }

    /* ---------- view switcher (Shelf / Bedside) ---------- */
    .view-switcher {
      display: flex; justify-content: center; gap: 6px;
      padding: 0 16px;
      margin: 0 0 8px;
    }
    .view-tab {
      background: transparent; border: none;
      padding: 6px 18px;
      font-size: 14px; font-family: inherit;
      color: var(--ink);
      opacity: 0.45;
      cursor: pointer;
      border-radius: 999px;
      letter-spacing: 0.02em;
      transition: opacity .15s ease, background .15s ease;
    }
    .view-tab:hover { opacity: 0.85; }
    .view-tab.active {
      opacity: 1;
      background: rgba(59,36,24,.10);
      font-weight: 600;
    }

    /* Bedside view — softer dusty wall colour so the switch feels like a different room */
    body[data-view="bedside"] {
      background:
        repeating-linear-gradient(0deg, transparent 0 22px, rgba(89,48,75,.04) 22px 23px),
        linear-gradient(180deg, #f0e4ea, #e6d6dd);
    }
    body[data-view="bedside"] .view-tab.active { background: rgba(89,48,75,.16); }

    /* Hide rating + tag groups in the add modal when adding to the bedside (you haven't read it yet) */
    #addModal[data-mode="bedside"] .review-only { display: none; }
  </style>
</head>
<body>
  <header class="max-w-3xl mx-auto px-4 pt-6 pb-3 flex items-end justify-between">
    <div>
      <h1 class="text-3xl font-bold tracking-tight">Bookshelf</h1>
      <p id="subtitle" class="text-sm opacity-70 italic">finished books look better on a shelf</p>
    </div>
    <button id="profileBtn" class="profile-chip" type="button">signing in...</button>
  </header>

  <nav class="view-switcher max-w-3xl mx-auto" role="tablist" aria-label="Section">
    <button class="view-tab" data-view="bookshelf" type="button" role="tab" aria-selected="true">Shelf</button>
    <button class="view-tab" data-view="bedside" type="button" role="tab" aria-selected="false">Bedside</button>
  </nav>

  <main id="shelves" class="max-w-3xl mx-auto px-2 pt-4 pb-32 space-y-7"></main>

  <button id="addBtn" class="fab" type="button" aria-label="Add a finished book">+</button>

  <dialog id="mysteryModal" aria-labelledby="mysteryTitleLabel">
    <form method="dialog" class="modal-inner">
      <h2 id="mysteryTitleLabel" class="text-xl font-bold leading-tight mb-3">A book for you…</h2>
      <div id="mysteryContent"></div>
      <div class="flex gap-2 mt-4">
        <button type="button" id="tryAnotherBtn" class="btn-wood flex-1 bg-opacity-20 bg-black text-[var(--ink)]">Try another</button>
        <button type="button" id="addMysteryBtn" class="btn-wood flex-1">Add to bedside</button>
      </div>
    </form>
  </dialog>

  <dialog id="bookModal" aria-labelledby="modalTitle">
    <form method="dialog" class="modal-inner">
      <div id="modalContent"></div>
      <button class="btn-wood mt-4" type="submit" value="close">close</button>
    </form>
  </dialog>

  <dialog id="addModal" aria-labelledby="addTitleLabel">
    <form id="addForm" class="modal-inner space-y-4">
      <h2 id="addTitleLabel" class="text-xl font-bold leading-tight">Add a finished book</h2>

      <!-- Default: search Google Books -->
      <div id="searchSection">
        <label class="block text-sm opacity-70 mb-1">Find your book</label>
        <input type="text" id="bookSearch" placeholder="Type a title or author…"
               autocomplete="off"
               class="w-full p-2 border rounded bg-[var(--paper)] text-[var(--ink)]" />
        <div id="searchResults" class="mt-2"></div>
        <button type="button" id="manualEntryLink" class="mt-2 text-xs underline opacity-70">Can't find it? Add manually</button>
      </div>

      <!-- Shown after a search result is picked -->
      <div id="selectedSection" class="hidden">
        <label class="block text-sm opacity-70 mb-1">Selected book</label>
        <div class="selected-card">
          <img id="selectedCover" alt="" />
          <div class="flex-1 min-w-0">
            <p id="selectedTitle" class="font-bold leading-tight"></p>
            <p id="selectedAuthor" class="text-sm opacity-70 mt-1"></p>
          </div>
          <button type="button" id="changeSelection" class="text-xs underline opacity-70 flex-shrink-0">change</button>
        </div>
      </div>

      <!-- Shown only if user opts out of search -->
      <div id="manualSection" class="hidden space-y-3">
        <input type="text" id="addTitle" placeholder="Title" class="w-full p-2 border rounded bg-[var(--paper)] text-[var(--ink)]" />
        <input type="text" id="addAuthor" placeholder="Author" class="w-full p-2 border rounded bg-[var(--paper)] text-[var(--ink)]" />
      </div>

      <div class="review-only">
        <label class="block text-sm opacity-70 mb-1">Rating</label>
        <div id="ratingStars" class="star-picker" aria-label="Rating from 1 to 5 stars">
          <button type="button" class="star" data-rating="1" aria-label="1 star">★</button>
          <button type="button" class="star" data-rating="2" aria-label="2 stars">★</button>
          <button type="button" class="star" data-rating="3" aria-label="3 stars">★</button>
          <button type="button" class="star" data-rating="4" aria-label="4 stars">★</button>
          <button type="button" class="star" data-rating="5" aria-label="5 stars">★</button>
        </div>
        <input type="hidden" id="addRating" value="5" />
      </div>

      <!-- Tagged review fields — feed the recommendation engine; hidden when adding to bedside -->
      <div class="review-only">
        <label class="chip-group-label">Genre <span class="opacity-50">(pick any)</span></label>
        <div id="genreChips" class="chip-group">
          <button type="button" class="chip" data-value="Literary fiction">Literary fiction</button>
          <button type="button" class="chip" data-value="Sci-fi">Sci-fi</button>
          <button type="button" class="chip" data-value="Fantasy">Fantasy</button>
          <button type="button" class="chip" data-value="Mystery/Thriller">Mystery/Thriller</button>
          <button type="button" class="chip" data-value="Horror">Horror</button>
          <button type="button" class="chip" data-value="Romance">Romance</button>
          <button type="button" class="chip" data-value="Classic">Classic</button>
          <button type="button" class="chip" data-value="Historical fiction">Historical fiction</button>
          <button type="button" class="chip" data-value="Non-fiction">Non-fiction</button>
          <button type="button" class="chip" data-value="Biography/Memoir">Biography/Memoir</button>
          <button type="button" class="chip" data-value="Pop science">Pop science</button>
          <button type="button" class="chip" data-value="Philosophy">Philosophy</button>
          <button type="button" class="chip" data-value="Poetry">Poetry</button>
        </div>
      </div>

      <div class="review-only">
        <label class="chip-group-label">Pace <span class="opacity-50">(pick one)</span></label>
        <div id="paceChips" class="chip-group">
          <button type="button" class="chip" data-value="Slow burn">Slow burn</button>
          <button type="button" class="chip" data-value="Steady">Steady</button>
          <button type="button" class="chip" data-value="Propulsive">Propulsive</button>
        </div>
      </div>

      <div class="review-only">
        <label class="chip-group-label">Tone <span class="opacity-50">(pick any)</span></label>
        <div id="toneChips" class="chip-group">
          <button type="button" class="chip" data-value="Dark">Dark</button>
          <button type="button" class="chip" data-value="Hopeful">Hopeful</button>
          <button type="button" class="chip" data-value="Witty">Witty</button>
          <button type="button" class="chip" data-value="Bleak">Bleak</button>
          <button type="button" class="chip" data-value="Earnest">Earnest</button>
          <button type="button" class="chip" data-value="Playful">Playful</button>
          <button type="button" class="chip" data-value="Contemplative">Contemplative</button>
          <button type="button" class="chip" data-value="Romantic">Romantic</button>
          <button type="button" class="chip" data-value="Tense">Tense</button>
        </div>
      </div>

      <div class="review-only">
        <label class="chip-group-label">Length felt <span class="opacity-50">(pick one)</span></label>
        <div id="lengthChips" class="chip-group">
          <button type="button" class="chip" data-value="Too short">Too short</button>
          <button type="button" class="chip" data-value="Just right">Just right</button>
          <button type="button" class="chip" data-value="A bit long">A bit long</button>
          <button type="button" class="chip" data-value="Way too long">Way too long</button>
        </div>
      </div>

      <div class="review-only">
        <label class="chip-group-label">Chapter length <span class="opacity-50">(pick one)</span></label>
        <div id="chapterChips" class="chip-group">
          <button type="button" class="chip" data-value="Short">Short</button>
          <button type="button" class="chip" data-value="Medium">Medium</button>
          <button type="button" class="chip" data-value="Long">Long</button>
        </div>
      </div>

      <div class="review-only">
        <label class="chip-group-label">Difficulty <span class="opacity-50">(pick one)</span></label>
        <div id="difficultyChips" class="chip-group">
          <button type="button" class="chip" data-value="Easy">Easy</button>
          <button type="button" class="chip" data-value="Medium">Medium</button>
          <button type="button" class="chip" data-value="Dense">Dense</button>
        </div>
      </div>

      <div>
        <textarea id="addNotes" placeholder="Thoughts / Notes" class="w-full p-2 border rounded bg-[var(--paper)] text-[var(--ink)] h-24"></textarea>
      </div>
      <div class="flex gap-2 mt-4">
        <button type="button" class="btn-wood flex-1 bg-opacity-20 bg-black text-[var(--ink)]" onclick="document.getElementById('addModal').close()">Cancel</button>
        <button type="submit" id="saveBookBtn" class="btn-wood flex-1">Save to shelf</button>
      </div>
    </form>
  </dialog>

  <footer class="text-center text-xs opacity-60 py-4">made with love · v1</footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAHMaWQRXsAglvgPxsAfR0tmTNzSo67-Y4",
      authDomain: "bookshelf-anthony.firebaseapp.com",
      projectId: "bookshelf-anthony",
      storageBucket: "bookshelf-anthony.firebasestorage.app",
      messagingSenderId: "723627755565",
      appId: "1:723627755565:web:5c96e32a6b9cee44ed50a4",
      measurementId: "G-XNE7ET849Z"
    };

    // Google Books API key — client-side, restricted by referrer to anthonygeo3.github.io
    const GOOGLE_BOOKS_KEY = "AIzaSyBSlndU-ynvDIPzoPxaB9EjbYbEJSzBjAc";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;
    let books = [];

    // Add-book modal state (search, manual fallback, selected result)
    let selectedBook = null;   // { title, author, cover }
    let searchTimer = null;
    let lastQuery = '';
    let backfillTried = false; // one-shot cover backfill per session
    const searchCache = new Map(); // term → filtered items array (in-session, prevents duplicate API hits)

    // Two named profiles on this device. Tap the chip to swap between them.
    // Choice is per-device — anonymous auth means no cross-device sync.
    const PROFILES = ['anthony', 'amy'];
    let activeProfile = localStorage.getItem('bookshelf:profile') || 'anthony';

    function setActiveProfile(name) {
      if (!PROFILES.includes(name)) return;
      activeProfile = name;
      localStorage.setItem('bookshelf:profile', name);
      const chip = document.getElementById('profileBtn');
      if (chip && currentUser) chip.textContent = name;
      document.body.dataset.profile = name;
      document.title = `${name[0].toUpperCase() + name.slice(1)}'s Bookshelf`;
      renderShelves();
    }
    // Initial paint before auth resolves
    document.body.dataset.profile = activeProfile;
    document.title = `${activeProfile[0].toUpperCase() + activeProfile.slice(1)}'s Bookshelf`;

    // ---- View state: Shelf (finished) vs Bedside (planned/to-read) ----
    let activeView = localStorage.getItem('bookshelf:view') || 'bookshelf';
    const VIEW_SUBTITLES = {
      bookshelf: 'finished books look better on a shelf',
      bedside:   "what's next on the pile",
    };
    function setActiveView(view) {
      if (view !== 'bookshelf' && view !== 'bedside') return;
      activeView = view;
      localStorage.setItem('bookshelf:view', view);
      document.body.dataset.view = view;
      document.querySelectorAll('.view-tab').forEach(tab => {
        const isActive = tab.dataset.view === view;
        tab.classList.toggle('active', isActive);
        tab.setAttribute('aria-selected', isActive ? 'true' : 'false');
      });
      const subtitleEl = document.getElementById('subtitle');
      if (subtitleEl) subtitleEl.textContent = VIEW_SUBTITLES[view];
      renderShelves();

    // ---- Recommendation engine ----
    // Build a normalised taste profile from the user's finished, tagged books.
    // Higher-rated books carry more weight.
    function buildTasteProfile(finishedBooks) {
      const genreScores = {};
      const toneScores = {};
      const paceCounts = { 'Slow burn': 0, 'Steady': 0, 'Propulsive': 0 };
      for (const book of finishedBooks) {
        const weight = (book.rating || 3) / 5;
        (book.genres || []).forEach(g => { genreScores[g] = (genreScores[g] || 0) + weight; });
        (book.tone   || []).forEach(t => { toneScores[t]  = (toneScores[t]  || 0) + weight; });
        if (book.pace) paceCounts[book.pace] = (paceCounts[book.pace] || 0) + weight;
      }
      const maxG = Math.max(1, ...Object.values(genreScores));
      const maxT = Math.max(1, ...Object.values(toneScores));
      const preferredPace = Object.entries(paceCounts).sort((a, b) => b[1] - a[1])[0]?.[0] || 'Steady';
      return {
        genreScores: Object.fromEntries(Object.entries(genreScores).map(([k, v]) => [k, v / maxG])),
        toneScores:  Object.fromEntries(Object.entries(toneScores).map(([k, v])  => [k, v / maxT])),
        preferredPace,
        hasData: finishedBooks.length > 0,
      };
    }

    function scoreCandidate(candidate, profile) {
      const gAvg = candidate.genres.length === 0 ? 0
        : candidate.genres.reduce((s, g) => s + (profile.genreScores[g] || 0), 0) / candidate.genres.length;
      const tAvg = candidate.tone.length === 0 ? 0
        : candidate.tone.reduce((s, t) => s + (profile.toneScores[t] || 0), 0) / candidate.tone.length;
      const paceMatch = candidate.pace === profile.preferredPace ? 1.0 : 0.5;
      return 0.5 * gAvg + 0.3 * tAvg + 0.2 * paceMatch;
    }

    // 25% of the time, pick a stretch — a low-scoring candidate, deliberately outside taste.
    function shouldStretch() { return Math.random() < 0.25; }

    function pickRecommendation(classics, finishedBooks, bedsideBooks, isStretch) {
      const excluded = new Set([
        ...finishedBooks.map(b => `${(b.title || '').toLowerCase()}|${(b.author || '').toLowerCase()}`),
        ...bedsideBooks .map(b => `${(b.title || '').toLowerCase()}|${(b.author || '').toLowerCase()}`),
      ]);
      const candidates = classics.filter(c =>
        !excluded.has(`${c.title.toLowerCase()}|${c.author.toLowerCase()}`)
      );
      if (candidates.length === 0) return null;

      const profile = buildTasteProfile(finishedBooks);
      if (!profile.hasData) {
        // No taste data yet — just pick at random
        return candidates[Math.floor(Math.random() * candidates.length)];
      }

      const scored = candidates
        .map(c => ({ book: c, score: scoreCandidate(c, profile) }))
        .sort((a, b) => b.score - a.score);

      if (isStretch) {
        // Pick from the bottom 40% — deliberately outside the comfort zone
        const stretchPool = scored.slice(Math.floor(scored.length * 0.6));
        const pick = stretchPool[Math.floor(Math.random() * Math.min(stretchPool.length, 10))];
        return pick ? pick.book : scored[scored.length - 1].book;
      }

      // Otherwise: weighted random from the top 5 — gives variety without straying far
      const topN = Math.min(5, scored.length);
      const top = scored.slice(0, topN);
      const weights = top.map((_, i) => topN - i);
      const total = weights.reduce((a, b) => a + b, 0);
      let r = Math.random() * total;
      for (let i = 0; i < top.length; i++) {
        r -= weights[i];
        if (r < 0) return top[i].book;
      }
      return top[0].book;
    }

    function reasoningFor(candidate, profile, isStretch) {
      if (isStretch) return 'a stretch pick — outside your usual taste. worth a try?';
      if (!profile.hasData) return 'from the classics list — tag a few finished books to make these smarter';

      const matchedGenres = candidate.genres.filter(g => (profile.genreScores[g] || 0) >= 0.5);
      const matchedTones  = candidate.tone .filter(t => (profile.toneScores[t]  || 0) >= 0.5);
      const bits = [];
      if (matchedTones.length)  bits.push(matchedTones.slice(0, 2).join(', ').toLowerCase());
      if (matchedGenres.length) bits.push(matchedGenres.slice(0, 2).join(' & ').toLowerCase());
      if (bits.length === 0) return 'a quieter match — fits your overall taste roughly';
      return `you tend to like ${bits.join(' / ')} books`;
    }

    // Google Books API helper — used for manual-entry covers + cover backfill
    async function fetchCover(title, author) {
      try {
        const q = encodeURIComponent(`intitle:${title}+inauthor:${author}`);
        const keyParam = GOOGLE_BOOKS_KEY ? `&key=${GOOGLE_BOOKS_KEY}` : '';
        const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${q}&maxResults=1${keyParam}`);
        const data = await res.json();
        const thumb = data.items?.[0]?.volumeInfo?.imageLinks?.thumbnail;
        return thumb ? thumb.replace('http:', 'https:') : null;
      } catch (e) {
        console.warn('Failed to fetch cover', e);
        return null;
      }
    }

    // Richer Google Books fetch — pulls cover + description + page count + year in one call.
    // Used by the mystery recommendation card. In-session cached so re-rolls don't re-fetch known titles.
    const bookDetailsCache = new Map();
    async function fetchBookDetails(title, author) {
      const cacheKey = `${title.toLowerCase()}|${author.toLowerCase()}`;
      if (bookDetailsCache.has(cacheKey)) return bookDetailsCache.get(cacheKey);
      try {
        const q = encodeURIComponent(`intitle:${title}+inauthor:${author}`);
        const keyParam = GOOGLE_BOOKS_KEY ? `&key=${GOOGLE_BOOKS_KEY}` : '';
        const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${q}&maxResults=1${keyParam}`);
        const data = await res.json();
        const vi = data.items?.[0]?.volumeInfo;
        if (!vi) { bookDetailsCache.set(cacheKey, null); return null; }
        const result = {
          cover:         (vi.imageLinks?.thumbnail || '').replace('http:', 'https:') || null,
          description:   vi.description   || null,
          pageCount:     vi.pageCount     || null,
          publishedDate: vi.publishedDate || null,
        };
        bookDetailsCache.set(cacheKey, result);
        return result;
      } catch (e) {
        console.warn('Failed to fetch book details', e);
        return null;
      }
    }

    // Strip Google's embedded HTML tags from descriptions and break at the nearest sentence
    // boundary near the limit so truncation reads cleanly.
    function truncateText(s, maxLen) {
      if (!s) return '';
      const clean = s.replace(/<[^>]+>/g, '').replace(/\s+/g, ' ').trim();
      if (clean.length <= maxLen) return clean;
      const slice = clean.substring(0, maxLen);
      const lastSentenceEnd = Math.max(slice.lastIndexOf('. '), slice.lastIndexOf('! '), slice.lastIndexOf('? '));
      if (lastSentenceEnd > maxLen * 0.55) {
        return slice.substring(0, lastSentenceEnd + 1);
      }
      return slice.trim() + '…';
    }

    // ---- Book search (Google Books) ----
    async function runBookSearch(term) {
      const resultsEl = document.getElementById('searchResults');

      // In-session cache: never re-fetch the same query in one session
      if (searchCache.has(term)) {
        renderSearchResults(searchCache.get(term));
        return;
      }

      resultsEl.innerHTML = '<div class="search-status">searching…</div>';
      const keyParam = GOOGLE_BOOKS_KEY ? `&key=${GOOGLE_BOOKS_KEY}` : '';
      const url = `https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(term)}&maxResults=6${keyParam}`;

      try {
        const res = await fetch(url);
        const bodyText = await res.text();
        let data = null;
        try { data = JSON.parse(bodyText); } catch (_) { /* non-JSON */ }

        if (!res.ok) {
          const msg = (data && data.error && data.error.message) || `HTTP ${res.status}`;
          console.warn('book search HTTP error', { status: res.status, body: bodyText, url });
          resultsEl.innerHTML = `<div class="search-status">search error: ${escapeHtml(msg)}</div>`;
          return;
        }
        if (!data) {
          console.warn('book search non-JSON response', { body: bodyText, url });
          resultsEl.innerHTML = '<div class="search-status">search error: bad response from server</div>';
          return;
        }
        if (data.error) {
          console.warn('book search api error', data.error);
          resultsEl.innerHTML = `<div class="search-status">search error: ${escapeHtml(data.error.message || 'unknown')}</div>`;
          return;
        }

        const items = (data.items || []).filter(i => i.volumeInfo && i.volumeInfo.title);
        searchCache.set(term, items); // cache successful responses only
        renderSearchResults(items);
      } catch (e) {
        console.warn('book search failed (fetch threw)', e, { url });
        resultsEl.innerHTML = `<div class="search-status">search failed: ${escapeHtml(String(e.message || e))}</div>`;
      }
    }

    function renderSearchResults(items) {
      const resultsEl = document.getElementById('searchResults');
      if (items.length === 0) {
        resultsEl.innerHTML = '<div class="search-status">no matches — try a different search</div>';
        return;
      }
      resultsEl.innerHTML = '';
      items.forEach(item => {
        const vi = item.volumeInfo;
        const title = vi.title;
        const author = (vi.authors && vi.authors.length) ? vi.authors.join(', ') : 'Unknown';
        const rawCover = (vi.imageLinks && vi.imageLinks.thumbnail) || '';
        const cover = rawCover ? rawCover.replace('http:', 'https:') : '';
        const row = document.createElement('button');
        row.type = 'button';
        row.className = 'search-result';
        row.innerHTML = `
          ${cover
            ? `<img src="${escapeHtml(cover)}" class="search-thumb" alt="" loading="lazy">`
            : '<div class="search-thumb-fallback"></div>'}
          <div class="search-meta">
            <div class="search-title">${escapeHtml(title)}</div>
            <div class="search-author">${escapeHtml(author)}</div>
          </div>
        `;
        row.addEventListener('click', () => selectSearchResult(title, author, cover));
        resultsEl.appendChild(row);
      });
    }

    function selectSearchResult(title, author, cover) {
      selectedBook = { title, author, cover: cover || null };
      document.getElementById('searchSection').classList.add('hidden');

      const coverEl = document.getElementById('selectedCover');

      else { coverEl.removeAttribute('src'); coverEl.style.display = 'none'; }
      document.getElementById('selectedTitle').textContent = title;
      document.getElementById('selectedAuthor').textContent = author;
    }

    // Open the add modal in "edit" mode — handles both:
    //   - converting a bedside book into a finished, reviewed one (title: "How was it?")

    // Pre-fills everything the book already has so the user only changes what they want.
    function openAddModalForEdit(b) {

      modal.dataset.editing = b.id;        // form submit will updateDoc instead of addDoc
      document.getElementById('addTitleLabel').textContent = isBedside ? 'How was it?' : 'Edit review';
      document.getElementById('saveBookBtn').textContent   = 'Save to shelf';

      // Lock the book selection — search hidden, "change" hidden, the selected card shows the book
      selectedBook = { title: b.title, author: b.author, cover: b.cover || null };
      document.getElementById('searchSection').classList.add('hidden');
      document.getElementById('manualSection').classList.add('hidden');
      document.getElementById('selectedSection').classList.remove('hidden');
      const coverEl = document.getElementById('selectedCover');
      if (b.cover) { coverEl.src = b.cover; coverEl.style.display = ''; }
      else         { coverEl.removeAttribute('src'); coverEl.style.display = 'none'; }
      document.getElementById('selectedTitle').textContent  = b.title;
      document.getElementById('selectedAuthor').textContent = b.author;
      document.getElementById('changeSelection').style.display = 'none';

      // Pre-fill rating + notes from whatever's saved
      setRating((b.rating != null) ? b.rating : 5);
      document.getElementById('addNotes').value  = b.notes || '';

      // Pre-select chips matching saved tags. CSS.escape handles values with slashes/spaces safely.
      clearAllChips();
      const activateChip = (groupId, value) => {
        if (!value) return;
        const chip = document.querySelector(`#${groupId} .chip[data-value="${CSS.escape(value)}"]`);
        if (chip) chip.classList.add('active');
      };
      (b.genres || []).forEach(g => activateChip('genreChips', g));
      (b.tone   || []).forEach(t => activateChip('toneChips',  t));
      activateChip('paceChips',   b.pace);
      activateChip('lengthChips', b.lengthFelt);

      modal.showModal();
    }

    // ---- Chip group helpers (review tagging) ----
    // Single-select groups: tapping one deactivates siblings. Multi: tapping just toggles.
    const CHIP_GROUPS = [
      { id: 'genreChips',      multi: true  },
      { id: 'paceChips',       multi: false },
      { id: 'toneChips',       multi: true  },
      { id: 'lengthChips',     multi: false },
      { id: 'chapterChips',    multi: false },
      { id: 'difficultyChips', multi: false },
    ];
    function setupChipGroup(id, multi) {
      document.getElementById(id).addEventListener('click', (e) => {
        const chip = e.target.closest('.chip');
        if (!chip) return;
        if (!multi) {
          document.querySelectorAll(`#${id} .chip.active`).forEach(c => {
            if (c !== chip) c.classList.remove('active');
          });
        }
        chip.classList.toggle('active');
      });
    }
    CHIP_GROUPS.forEach(g => setupChipGroup(g.id, g.multi));

    function chipValues(id) {
      return Array.from(document.querySelectorAll(`#${id} .chip.active`)).map(c => c.dataset.value);
    }
    function chipValue(id) {
      const active = document.querySelector(`#${id} .chip.active`);
      return active ? active.dataset.value : null;
    }
    function clearAllChips() {
      CHIP_GROUPS.forEach(g => {
        document.querySelectorAll(`#${g.id} .chip.active`).forEach(c => c.classList.remove('active'));
      });
    }

    // ---- Star picker (rating input) ----
    function setRating(value) {
      const v = Math.max(1, Math.min(5, parseInt(value, 10) || 5));
      document.getElementById('addRating').value = String(v);
      document.querySelectorAll('#ratingStars .star').forEach((star, idx) => {
        star.classList.toggle('filled', idx < v);
      });
    }
    document.getElementById('ratingStars').addEventListener('click', (e) => {
      const star = e.target.closest('.star');
      if (!star) return;
      setRating(star.dataset.rating);
    });
    setRating(5); // initial paint matches the default hidden input value

    // ---- Mystery recommendation flow ----
    let currentMystery = null; // { book, isStretch, cover }

    async function openMysteryRecommendation() {
      const dlg = document.getElementById('mysteryModal');
      document.getElementById('mysteryContent').innerHTML = '<div class="search-status">picking a book…</div>';
      document.getElementById('addMysteryBtn').disabled = true;
      document.getElementById('tryAnotherBtn').disabled = true;
      dlg.showModal();
      await pickAndRenderMystery();
    }

    async function pickAndRenderMystery() {
      // Profile is built from FINISHED books in the active profile only.
      const finishedBooks = books.filter(b =>
        (b.profile || 'anthony') === activeProfile &&
        (b.status  || 'finished') === 'finished'
      );
      const bedsideBooks = books.filter(b =>
        (b.profile || 'anthony') === activeProfile &&
        (b.status  || 'finished') === 'bedside'
      );

      const isStretch = shouldStretch();
      const pick = pickRecommendation(CLASSICS, finishedBooks, bedsideBooks, isStretch);

      const contentEl = document.getElementById('mysteryContent');
      if (!pick) {
        contentEl.innerHTML = '<div class="search-status">no more recs — you\'ve covered the whole list. tell me to expand it.</div>';
        return;
      }

      // Pull cover + blurb + page count + year in a single call (cached, so re-rolls are cheap)
      const details   = await fetchBookDetails(pick.title, pick.author);
      const cover     = details?.cover || null;
      const blurb     = truncateText(details?.description, 280);
      const pageCount = details?.pageCount || null;
      const year      = details?.publishedDate ? String(details.publishedDate).substring(0, 4) : null;

      const profile = buildTasteProfile(finishedBooks);
      currentMystery = { book: pick, isStretch, cover };

      const coverHtml = cover ? `<img src="${escapeHtml(cover)}" alt="cover" class="modal-cover" />` : '';
      const yearStr   = year ? ` <span class="opacity-60">(${escapeHtml(year)})</span>` : '';
      const genrePillsHtml = pick.genres.length
        ? `<div class="tag-pills mt-2">${pick.genres.map(g => `<span class="tag-pill">${escapeHtml(g)}</span>`).join('')}</div>`
        : '';

      // Compact meta line: "328 pages · slow burn · long chapters · dense difficulty"
      const metaParts = [];
      if (pageCount)           metaParts.push(`${pageCount} pages`);
      if (pick.pace)           metaParts.push(pick.pace.toLowerCase());
      if (pick.chapterLength)  metaParts.push(`${pick.chapterLength.toLowerCase()} chapters`);
      if (pick.difficulty)     metaParts.push(`${pick.difficulty.toLowerCase()} difficulty`);
      const metaHtml = metaParts.length
        ? `<p class="text-xs opacity-70 mt-2">${escapeHtml(metaParts.join(' · '))}</p>`
        : '';

      const blurbHtml = blurb
        ? `<p class="text-sm leading-relaxed mt-3" style="opacity:.85">${escapeHtml(blurb)}</p>`
        : '';

      const reasoning = reasoningFor(pick, profile, isStretch);

      contentEl.innerHTML = `
        ${coverHtml}
        <h3 class="text-lg font-bold leading-tight">${escapeHtml(pick.title)}</h3>
        <p class="opacity-70 text-sm">${escapeHtml(pick.author)}${yearStr}</p>
        ${genrePillsHtml}
        ${metaHtml}
        <div style="clear:both"></div>
        ${blurbHtml}
        <p class="text-xs opacity-60 mt-3 italic">${escapeHtml(reasoning)}</p>
      `;

      document.getElementById('addMysteryBtn').disabled = false;
      document.getElementById('tryAnotherBtn').disabled = false;
    }

    document.getElementById('tryAnotherBtn').addEventListener('click', () => {
      document.getElementById('mysteryContent').innerHTML = '<div class="search-status">picking another…</div>';
      document.getElementById('addMysteryBtn').disabled = true;
      document.getElementById('tryAnotherBtn').disabled = true;
      pickAndRenderMystery();
    });

    document.getElementById('addMysteryBtn').addEventListener('click', async () => {
      if (!currentMystery || !currentUser) return;
      const { book, cover } = currentMystery;
      const btn = document.getElementById('addMysteryBtn');
      btn.textContent = 'Adding…';
      btn.disabled = true;
      try {
        const colorIdx = Math.floor(Math.random() * spineColors.length);
        await addDoc(collection(db, `users/${currentUser.uid}/books`), {
          title: book.title,
          author: book.author,
          cover: cover || null,
          coverAttempted: true,
          profile: activeProfile,
          status: 'bedside',
          rating: null,
          notes: '',
          genres: [], tone: [], pace: null, lengthFelt: null,
          chapterLength: null, difficulty: null,
          spine: spineColors[colorIdx],
          ink: inkColors[colorIdx],
          height: Math.floor(Math.random() * (190 - 140 + 1)) + 140,
          width:  Math.floor(Math.random() * (46  - 30  + 1)) + 30,
          createdAt: serverTimestamp(),
          fromRecommendation: true,
        });
        document.getElementById('mysteryModal').close();
      } catch (err) {
        console.error('mystery save failed', err);
        alert('Save failed — try again.');
      } finally {
        btn.textContent = 'Add to bedside';
        btn.disabled = false;
      }
    });

    // ---- Cover backfill: one-shot per session, fills in covers for books that don't have one ----
    async function backfillMissingCovers() {
      if (!currentUser) return;
      const candidates = books.filter(b => !b.cover && !b.coverAttempted);
      for (const b of candidates) {
        try {
          const cover = await fetchCover(b.title, b.author);
          const update = { coverAttempted: true };
          if (cover) update.cover = cover;
          await updateDoc(doc(db, `users/${currentUser.uid}/books`, b.id), update);
        } catch (e) {
          console.warn('cover backfill failed for', b.title, e);
        }
        // be polite to the API between calls
        await new Promise(r => setTimeout(r, 300));
      }
    }

    // ---- Form submission ----
    document.getElementById('addForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!currentUser) return;

      // Resolve book data from either a search-selection or manual entry
      let title, author, cover;
      if (selectedBook) {
        ({ title, author, cover } = selectedBook);
      } else {
        title  = document.getElementById('addTitle').value.trim();
        author = document.getElementById('addAuthor').value.trim();
        if (!title || !author) {
          alert('Search for a book above, or fill in title and author manually.');
          return;
        }
        cover = await fetchCover(title, author);
      }

      const rating = parseInt(document.getElementById('addRating').value, 10);
      const notes  = document.getElementById('addNotes').value;

      // Tagged review data — drives the future recommendation engine
      const genres        = chipValues('genreChips');
      const pace          = chipValue('paceChips');
      const tone          = chipValues('toneChips');
      const lengthFelt    = chipValue('lengthChips');
      const chapterLength = chipValue('chapterChips');
      const difficulty    = chipValue('difficultyChips');

      const btn = document.getElementById('saveBookBtn');
      btn.textContent = 'Saving...';
      btn.disabled = true;

      // Read mode set when the modal opened — survives view changes during edit
      const modal = document.getElementById('addModal');
      const modeAtOpen = modal.dataset.mode || 'shelf';
      const editingId = modal.dataset.editing || null;
      const status = modeAtOpen === 'bedside' ? 'bedside' : 'finished';

      try {
        if (editingId) {
          // Editing existing — convert bedside → shelf, preserve original metadata, write review fields
          await updateDoc(doc(db, `users/${currentUser.uid}/books`, editingId), {
            rating, notes, status: 'finished',
            genres, pace, tone, lengthFelt, chapterLength, difficulty,
          });
        } else {
          const colorIdx = Math.floor(Math.random() * spineColors.length);
          await addDoc(collection(db, `users/${currentUser.uid}/books`), {
            title, author, rating, notes, cover: cover || null,
            coverAttempted: true,
            profile: activeProfile,
            status,
            genres, pace, tone, lengthFelt, chapterLength, difficulty,
            spine: spineColors[colorIdx],
            ink: inkColors[colorIdx],
            height: Math.floor(Math.random() * (190 - 140 + 1)) + 140, // 140-190px
            width:  Math.floor(Math.random() * (46  - 30  + 1)) + 30,  // 30-46px
            createdAt: serverTimestamp()
          });
        }
        document.getElementById('addModal').close();
      } catch (err) {
        console.error('save failed', err);
        alert('Save failed — try again.');
      } finally {
        btn.textContent = status === 'bedside' ? 'Save to bedside' : 'Save to shelf';
        btn.disabled = false;
      }
    });

    // ---- Search/manual/selection wiring ----
    document.getElementById('bookSearch').addEventListener('input', () => {
      const term = document.getElementById('bookSearch').value.trim();
      clearTimeout(searchTimer);
      const resultsEl = document.getElementById('searchResults');
      // Min 4 chars + 500ms debounce keeps quota-spend modest while still feeling responsive.
      if (term.length < 4) { resultsEl.innerHTML = ''; return; }
      searchTimer = setTimeout(() => {
        if (term === lastQuery) return;
        lastQuery = term;
        runBookSearch(term);
      }, 500);
    });
    document.getElementById('bookSearch').addEventListener('keydown', (e) => {
      // don't submit the form on Enter while typing a search
      if (e.key === 'Enter') e.preventDefault();
    });
    document.getElementById('manualEntryLink').addEventListener('click', () => {
      document.getElementById('searchSection').classList.add('hidden');
      document.getElementById('manualSection').classList.remove('hidden');
      setTimeout(() => document.getElementById('addTitle').focus(), 50);
    });
    document.getElementById('changeSelection').addEventListener('click', () => {
      selectedBook = null;
      document.getElementById('selectedSection').classList.add('hidden');
      document.getElementById('searchSection').classList.remove('hidden');
      setTimeout(() => document.getElementById('bookSearch').focus(), 50);
    });
    // Reset on every close (cancel button, Escape key, or after save)
    document.getElementById('addModal').addEventListener('close', resetAddForm);

    // Rendering Logic
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
    }

    function stars(n) {
      const filled = '★'.repeat(Math.max(0, Math.min(5, n)));
      return filled + '☆'.repeat(5 - filled.length);
    }

    function chunk(arr, n) {
      const out = [];
      for (let i = 0; i < arr.length; i += n) out.push(arr.slice(i, i + n));
      return out;
    }

    // How wide a book renders on the shelf — must match what makeBookEl actually sets.
    function bookDisplayWidth(b) {
      return b.cover
        ? Math.round((b.height || 160) * 0.66)
        : (b.width || 38);
    }

    // Sentinel for the "+" empty slot — packed alongside books so it always sits next to the last one.
    const SLOT_ITEM = Object.freeze({ isSlot: true, width: 38 });
    // Sentinel for the mystery "?" tile — only appears on the Bedside (recommendation engine entry point)
    const MYSTERY_ITEM = Object.freeze({ isMystery: true, width: 100, height: 160 });

    // Pack a list of items (books + slot + mystery) into shelf rows that fit the container width.
    // Each output row will be its own shelf section (with its own plank).
    function packIntoRows(items, containerWidth) {
      const gap = 6;
      const padding = 28; // .shelf-row left + right padding (14 + 14)
      const available = Math.max(80, containerWidth - padding);
      const rows = [];
      let current = [];
      let curWidth = 0;
      for (const item of items) {
        const w = (item.isSlot || item.isMystery) ? item.width : bookDisplayWidth(item);
        const widthWithGap = current.length > 0 ? gap + w : w;
        if (curWidth + widthWithGap > available && current.length > 0) {
          rows.push(current);
          current = [];
          curWidth = 0;
        }
        current.push(item);
        curWidth += current.length === 1 ? w : (gap + w);
      }
      if (current.length > 0) rows.push(current);
      return rows;
    }

    function renderShelves() {
      const root = document.getElementById('shelves');
      root.innerHTML = '';

      // Filter by active profile AND active view.
      // Legacy: books without a profile default to 'anthony'; books without a status default to 'finished' (on the Shelf).
      const expectedStatus = activeView === 'bedside' ? 'bedside' : 'finished';
      const visibleBooks = books.filter(b =>
        (b.profile || 'anthony') === activeProfile &&
        (b.status  || 'finished') === expectedStatus
      );

      // On the Bedside, prepend the mystery "?" tile. Always append the "+" empty slot.
      const items = activeView === 'bedside'
        ? [MYSTERY_ITEM, ...visibleBooks, SLOT_ITEM]
        : [...visibleBooks, SLOT_ITEM];
      const containerWidth = root.clientWidth || 460;
      const rows = packIntoRows(items, containerWidth);

      // Always show at least MIN_SHELVES rows so the bookcase doesn't look bare.
      while (rows.length < MIN_SHELVES) rows.push([]);

      rows.forEach((row, idx) => {
        const shelf = document.createElement('section');
        shelf.className = 'shelf';
        shelf.setAttribute('aria-label', `Shelf ${idx + 1}`);

        const list = document.createElement('div');
        list.className = 'shelf-row';

        row.forEach(item => {
          if (item.isSlot) {
            const slot = document.createElement('button');
            slot.type = 'button';
            slot.className = 'empty-slot';
            slot.setAttribute('aria-label', 'Add a finished book');
            slot.textContent = '+';
            slot.addEventListener('click', openAddModal);
            list.appendChild(slot);
          } else if (item.isMystery) {
            const myst = document.createElement('button');
            myst.type = 'button';
            myst.className = 'book book-mystery';
            myst.style.width = item.width + 'px';
            myst.style.minHeight = item.height + 'px';
            myst.setAttribute('aria-label', 'A mystery recommendation');
            myst.textContent = '?';
            myst.addEventListener('click', openMysteryRecommendation);
            list.appendChild(myst);
          } else {
            list.appendChild(makeBookEl(item));
          }
        });

        const plank = document.createElement('div');
        plank.className = 'shelf-plank';

        shelf.appendChild(list);
        shelf.appendChild(plank);
        root.appendChild(shelf);
      });
    }

    function makeBookEl(b) {
      const el = document.createElement('button');
      el.type = 'button';
      el.className = 'book';
      el.style.minHeight = (b.height || 160) + 'px';
      el.setAttribute('aria-label', `${b.title} by ${b.author}, rated ${b.rating} of 5`);
      el.addEventListener('click', () => openBook(b));

      if (b.cover) {
        // Face-out: show the cover art. Width ≈ 2/3 of height (standard book aspect).
        el.classList.add('book-face');
        el.style.width = Math.round((b.height || 160) * 0.66) + 'px';
        // JSON.stringify safely quotes the URL for use in CSS url()
        el.style.backgroundImage = `url(${JSON.stringify(b.cover)})`;
        el.title = `${b.title} — ${b.author}`;
      } else {
        // Spine-out fallback: coloured spine with vertical title text.
        el.classList.add('book-spine');
        el.style.background = `linear-gradient(90deg, ${b.spine} 0%, ${b.spine} 65%, rgba(0,0,0,0.18) 100%)`;
        el.style.color = b.ink;
        el.style.width = (b.width || 38) + 'px';
        el.textContent = b.title;
      }
      return el;
    }

    function openBook(b) {
      const dlg = document.getElementById('bookModal');
      const c = document.getElementById('modalContent');
      const cover = b.cover
        ? `<img src="${escapeHtml(b.cover)}" alt="cover of ${escapeHtml(b.title)}" class="modal-cover" />`
        : '';
      
      const isBedside = (b.status || 'finished') === 'bedside';

      // Review tags — only shown for finished books (bedside books aren't reviewed yet)
      const tags = isBedside ? [] : [
        ...(b.genres || []),
        ...(b.pace ? [b.pace] : []),
        ...(b.tone || []),
        ...(b.lengthFelt ? [b.lengthFelt] : []),
        ...(b.chapterLength ? [`${b.chapterLength} chapters`] : []),
        ...(b.difficulty ? [`${b.difficulty} difficulty`] : []),
      ];
      const tagsHtml = tags.length
        ? `<div class="tag-pills">${tags.map(t => `<span class="tag-pill">${escapeHtml(t)}</span>`).join('')}</div>`
        : '';

      // Stars are hidden for bedside books (no rating until read)
      const starsBlock = isBedside
        ? `<p class="text-xs italic opacity-60 mb-2">— on your bedside —</p>`
        : `<p class="stars text-lg mb-1" aria-label="rating ${b.rating || 0} of 5">${stars(b.rating || 0)}</p>`;

      // "no notes yet" only shown for finished books — bedside might just not have notes
      const notesHtml = b.notes
        ? `<p class="text-sm leading-relaxed">${escapeHtml(b.notes)}</p>`
        : (isBedside ? '' : '<p class="text-sm leading-relaxed"><em class="opacity-60">no notes yet</em></p>');

      const deleteLabel = isBedside ? 'Remove from bedside' : 'Delete book';
      // For bedside books only: prominent "I've read this" button that opens the review/convert flow
      const moveBlock = isBedside
        ? `<button type="button" id="moveToShelfBtn" class="btn-wood mt-4">I've read this — move to shelf</button>`
        : '';
      // For finished books only: small "Edit review" link next to the delete button
      const editLink = !isBedside
        ? `<button type="button" id="editBookBtn" class="text-[#5d4a82] text-sm font-semibold opacity-80 hover:opacity-100">Edit review</button>`
        : '';
      const actionRowJustify = isBedside ? 'justify-end' : 'justify-between';

      c.innerHTML = `
        ${cover}
        <h2 id="modalTitle" class="text-xl font-bold leading-tight">${escapeHtml(b.title)}</h2>
        <p class="opacity-70 text-sm mb-2">${escapeHtml(b.author)}</p>
        ${starsBlock}
        ${tagsHtml}
        ${notesHtml}
        <div style="clear:both"></div>
        ${moveBlock}
        <div class="mt-6 pt-4 border-t border-[rgba(59,36,24,.1)] flex ${actionRowJustify} items-center">
          ${editLink}
          <button type="button" id="deleteBookBtn" class="text-[#8b3a3a] text-sm font-semibold opacity-80 hover:opacity-100">${deleteLabel}</button>
        </div>
      `;

      // Wire up the delete button
      document.getElementById('deleteBookBtn').addEventListener('click', async () => {
        const confirmMsg = isBedside
          ? `Remove "${b.title}" from your bedside?`
          : `Are you sure you want to remove "${b.title}" from your shelf?`;
        if (confirm(confirmMsg)) {
          const btn = document.getElementById('deleteBookBtn');
          btn.textContent = isBedside ? 'Removing...' : 'Deleting...';
          btn.disabled = true;

          await deleteDoc(doc(db, `users/${currentUser.uid}/books`, b.id));
          dlg.close();
        }
      });

      // Bedside-only: "I've read this" opens the add modal in edit-convert mode
      if (isBedside) {
        document.getElementById('moveToShelfBtn').addEventListener('click', () => {
          dlg.close();
          openAddModalForEdit(b);
        });
      } else {
        // Finished books: "Edit review" opens the same modal pre-populated with existing tags/rating/notes
        document.getElementById('editBookBtn').addEventListener('click', () => {
          dlg.close();
          openAddModalForEdit(b);
        });
      }

      dlg.showModal();
    }

    document.getElementById('addBtn').addEventListener('click', openAddModal);

    // Profile chip — tap to swap between anthony and amy (per-device, persisted in localStorage).
    document.getElementById('profileBtn').addEventListener('click', () => {
      if (!currentUser) return; // ignore taps while still signing in
      setActiveProfile(activeProfile === 'anthony' ? 'amy' : 'anthony');
    });

    // View tabs — tap to swap between Shelf (finished) and Bedside (to-read).
    document.querySelectorAll('.view-tab').forEach(tab => {
      tab.addEventListener('click', () => setActiveView(tab.dataset.view));
    });
    // Initial activation: marks the right tab .active and writes the right subtitle.
    setActiveView(activeView);

    // Re-pack shelves when the container width changes (window resize, phone rotation).
    // Debounced so a drag-resize doesn't fire on every pixel.
    let lastShelfWidth = 0;
    let shelfResizeTimer = null;
    const shelvesRoot = document.getElementById('shelves');
    new ResizeObserver(entries => {
      const w = entries[0].contentRect.width;
      if (Math.abs(w - lastShelfWidth) < 4) return; // ignore sub-pixel jitter
      clearTimeout(shelfResizeTimer);
      shelfResizeTimer = setTimeout(() => {
        lastShelfWidth = w;
        renderShelves();
      }, 150);
    }).observe(shelvesRoot);

    // ---- service worker registration ----
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err => console.warn('SW register failed:', err));
      });
    }
  </script>
</body>
