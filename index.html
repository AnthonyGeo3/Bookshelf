<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#3b2418" />
  <meta name="description" content="A personal digital bookshelf — finished books look better on a shelf." />
  <title>Bookshelf</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" sizes="192x192" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --paper: #f4ecd8;
      --paper-shade: #e9dcc0;
      --ink: #3b2418;
      --wood-light: #6b4226;
      --wood-mid: #4a2c1a;
      --wood-dark: #2e1c10;
      --accent: #8b3a3a;
      --plum-mid: #4a3b6b;
      --plum-deep: #2e1b4a;
    }
    html, body { background: var(--paper); color: var(--ink); }
    body {
      font-family: ui-serif, Georgia, "Times New Roman", serif;
      background:
        repeating-linear-gradient(0deg, transparent 0 22px, rgba(59,36,24,.04) 22px 23px),
        linear-gradient(180deg, var(--paper), var(--paper-shade));
      min-height: 100vh;
      min-height: 100dvh;
    }
    h1, h2 { font-family: ui-serif, "Iowan Old Style", Georgia, serif; }

    /* ---------- bookcase ---------- */
    .shelf { position: relative; padding-bottom: 10px; }
    /* Books spread evenly across the plank rather than left-packed with dead space on the right. */
    .shelf-row {
      display: flex; align-items: flex-end; justify-content: space-evenly; gap: 6px;
      padding: 8px 20px 0;
      min-height: 168px;
    }
    .shelf-plank {
      height: 16px;
      margin: 0 12px;
      background: linear-gradient(180deg, var(--wood-light) 0%, var(--wood-mid) 55%, var(--wood-dark) 100%);
      box-shadow: 0 8px 12px -3px rgba(0,0,0,.34), inset 0 1px 0 rgba(255,255,255,.12), inset 0 -2px 0 rgba(0,0,0,.25);
      border-radius: 2px 2px 6px 6px;
    }

    /* ---------- book (shared base) ---------- */
    .book {
      flex: 0 0 auto; min-height: 150px; border-radius: 3px 3px 1px 1px;
      cursor: pointer; color: inherit; border: none; overflow: hidden;
      background-size: cover; background-position: center;
      background-color: var(--paper-shade);
      font-family: ui-serif, Georgia, serif;
      transition: transform .15s ease, box-shadow .15s ease; will-change: transform;
      box-shadow: 2px 3px 4px rgba(0,0,0,.20);
    }
    .book:hover, .book:focus-visible {
      transform: translateY(-8px); outline: none;
      box-shadow: 2px 8px 10px rgba(0,0,0,.25);
    }

    /* Spine-out — fallback for books without a cover: coloured spine + vertical title */
    .book.book-spine {
      writing-mode: vertical-rl; text-orientation: mixed;
      padding: 10px 4px; line-height: 1.1;
      font-size: 11px; font-weight: 600; letter-spacing: 0.04em;
      text-overflow: ellipsis; white-space: nowrap;
      box-shadow:
        inset -3px 0 0 rgba(0,0,0,.22),
        inset 3px 0 0 rgba(255,255,255,.10),
        2px 3px 4px rgba(0,0,0,.20);
    }
    .book.book-spine:hover, .book.book-spine:focus-visible {
      box-shadow:
        inset -3px 0 0 rgba(0,0,0,.22),
        inset 3px 0 0 rgba(255,255,255,.10),
        2px 8px 10px rgba(0,0,0,.25);
    }

    /* Face-out — books with a cover: cover art shown as background. Width set inline (≈2/3 of height). */
    .book.book-face { /* width comes from JS */ }

    /* Mystery "?" tile — appears on the Bedside only, taps to surface a recommendation */
    .book.book-mystery {
      background: linear-gradient(135deg, #2e1b4a, #4a3b6b 45%, #6b4a8d 100%);
      color: #f4ecd8;
      display: flex; align-items: center; justify-content: center;
      font-size: 54px; font-weight: 700;
      font-family: ui-serif, Georgia, "Times New Roman", serif;
      text-shadow: 0 0 14px rgba(255,255,255,.18);
      position: relative;
    }
    .book.book-mystery::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(circle at 30% 25%, rgba(255,255,255,.12), transparent 55%);
      pointer-events: none;
    }

    .book:nth-child(4n) { transform: rotate(-1.2deg); }
    .book:nth-child(7n) { transform: rotate(1.4deg); }
    .book:nth-child(4n):hover, .book:nth-child(4n):focus-visible,
    .book:nth-child(7n):hover, .book:nth-child(7n):focus-visible { transform: translateY(-8px); }

    /* ---------- empty slot placeholder ---------- */
    .empty-slot {
      flex: 0 0 auto; width: 38px; min-height: 150px; border: 1.5px dashed rgba(59,36,24,.25);
      border-radius: 3px; color: rgba(59,36,24,.45); display: flex; align-items: center;
      justify-content: center; font-size: 22px; background: transparent; cursor: pointer;
    }
    .empty-slot:hover { background: rgba(59,36,24,.04); color: var(--ink); }

    /* ---------- floating add button ---------- */
    .fab {
      position: fixed; bottom: max(16px, env(safe-area-inset-bottom)); right: 16px;
      width: 56px; height: 56px; border-radius: 50%; background: var(--wood-mid);
      color: var(--paper); font-size: 30px; line-height: 1; box-shadow: 0 8px 16px rgba(0,0,0,.25);
      border: none; cursor: pointer;
    }
    .fab:active { transform: translateY(1px); }

    /* ---------- modal ---------- */
    dialog {
      border: none; padding: 0; border-radius: 14px; background: var(--paper);
      color: var(--ink); width: min(92vw, 460px); box-shadow: 0 20px 60px rgba(0,0,0,.35);
    }
    dialog::backdrop { background: rgba(0,0,0,.45); }
    .modal-inner { padding: 20px 22px 22px; }
    .modal-cover {
      float: left; width: 110px; height: 165px; margin: 0 14px 8px 0;
      border-radius: 4px; box-shadow: 0 6px 10px rgba(0,0,0,.25); object-fit: cover; background: var(--paper-shade);
    }
    /* Read-only star display — half-fillable glyphs (supports 4.5 etc.) */
    .stars { display: inline-flex; gap: 2px; line-height: 1; }
    .star-glyph {
      position: relative; display: inline-block; width: 1em; height: 1em;
      color: rgba(59,36,24,.22);            /* empty portion */
    }
    .star-glyph::before { content: '★'; position: absolute; left: 0; top: 0; }
    .star-glyph > i {
      position: absolute; left: 0; top: 0; height: 100%; width: 0;
      overflow: hidden; color: #c2761b;     /* filled portion */
    }
    .star-glyph > i::before { content: '★'; }

    /* Tappable star picker in the add/edit form — tap left/right half for .5 / whole */
    .star-picker { display: flex; gap: 6px; padding: 4px 0; }
    .star {
      position: relative; background: transparent; border: none; cursor: pointer;
      font-size: 34px; line-height: 1; width: 1em; height: 1em; padding: 0;
      color: rgba(59,36,24,.22); font-family: inherit;
      transition: transform .12s ease;
    }
    .star::before { content: '★'; position: absolute; left: 0; top: 0; }
    .star > i {
      position: absolute; left: 0; top: 0; height: 100%; width: 0;
      overflow: hidden; color: #c2761b; pointer-events: none;
    }
    .star > i::before { content: '★'; }
    .star:hover, .star:focus-visible { transform: scale(1.15); outline: none; }

    .btn-wood {
      width: 100%; padding: 10px 0; border-radius: 8px; background: var(--wood-mid);
      color: var(--paper); border: none; cursor: pointer; font-size: 14px; letter-spacing: 0.04em;
    }
    .btn-wood:disabled { opacity: 0.7; cursor: not-allowed; }

    /* ---------- profile chip ---------- */
    .profile-chip {
      background: rgba(59,36,24,.08); padding: 4px 10px; border-radius: 999px;
      font-size: 12px; letter-spacing: 0.04em; border: 1px solid rgba(59,36,24,.15);
      cursor: pointer; user-select: none;
      transition: background .15s ease, border-color .15s ease, color .15s ease;
    }
    .profile-chip:hover { background: rgba(59,36,24,.14); }
    body[data-profile="amy"] .profile-chip {
      background: rgba(139, 58, 58, .10);
      border-color: rgba(139, 58, 58, .28);
      color: var(--accent);
    }
    body[data-profile="amy"] .profile-chip:hover {
      background: rgba(139, 58, 58, .18);
    }

    input, textarea { border-color: rgba(59,36,24,.2); outline-color: var(--wood-mid); }

    /* ---------- search results in add-book modal ---------- */
    #searchResults { max-height: 18rem; overflow-y: auto; }
    .search-result {
      display: flex; gap: 10px; align-items: flex-start; width: 100%;
      padding: 8px; border: none; background: transparent;
      cursor: pointer; text-align: left; border-radius: 6px;
      transition: background .15s ease;
      color: var(--ink); font-family: inherit;
    }
    .search-result:hover, .search-result:focus-visible {
      background: rgba(59,36,24,.08); outline: none;
    }
    .search-thumb, .search-thumb-fallback {
      width: 36px; height: 54px; border-radius: 3px; flex-shrink: 0;
      background: var(--paper-shade);
      box-shadow: 0 1px 3px rgba(0,0,0,.18);
    }
    .search-thumb { object-fit: cover; }
    .search-meta { flex: 1; min-width: 0; }
    .search-title {
      font-weight: 600; font-size: 14px; line-height: 1.2;
      overflow: hidden; text-overflow: ellipsis;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }
    .search-author {
      font-size: 12px; opacity: 0.7; margin-top: 2px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .search-status { padding: 10px; font-size: 13px; opacity: 0.6; text-align: center; }

    /* ---------- chip groups (review tagging) ---------- */
    .chip-group-label {
      display: block; font-size: 13px; opacity: 0.7; margin-bottom: 6px;
    }
    .chip-group { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      padding: 5px 12px;
      border-radius: 999px;
      border: 1px solid rgba(59,36,24,.22);
      background: transparent;
      color: var(--ink);
      font-size: 13px; font-family: inherit;
      cursor: pointer;
      transition: background .15s ease, border-color .15s ease, color .15s ease;
    }
    .chip:hover { background: rgba(59,36,24,.06); }
    .chip.active {
      background: var(--wood-mid);
      color: var(--paper);
      border-color: var(--wood-mid);
    }

    /* Read-only pills shown in the book detail modal */
    .tag-pills {
      display: flex; flex-wrap: wrap; gap: 5px;
      margin: 6px 0 10px;
    }
    .tag-pill {
      font-size: 11px;
      padding: 2px 9px;
      border-radius: 999px;
      background: rgba(59,36,24,.08);
      border: 1px solid rgba(59,36,24,.15);
      color: var(--ink);
    }

    .selected-card {
      display: flex; gap: 12px; align-items: flex-start;
      padding: 10px; border-radius: 8px;
      border: 1px solid rgba(59,36,24,.15); background: rgba(59,36,24,.04);
    }
    .selected-card img { width: 56px; height: 84px; object-fit: cover; border-radius: 3px; box-shadow: 0 2px 4px rgba(0,0,0,.18); flex-shrink: 0; background: var(--paper-shade); }
    .hidden { display: none !important; }

    /* ---------- header right column (icons + view toggle) ---------- */
    .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 9px; }
    .header-icons { display: flex; align-items: center; gap: 8px; }
    .view-toggle {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 15px; border-radius: 999px;
      background: var(--wood-mid); color: var(--paper);
      font-family: inherit; font-size: 13px; letter-spacing: 0.02em;
      border: none; cursor: pointer;
      box-shadow: 0 3px 8px rgba(0,0,0,.18);
      transition: background .15s ease, transform .12s ease;
      white-space: nowrap;
    }
    .view-toggle:active { transform: translateY(1px); }

    /* Bedside view — softer dusty wall colour so the switch feels like a different room */
    body[data-view="bedside"] {
      background:
        repeating-linear-gradient(0deg, transparent 0 22px, rgba(89,48,75,.04) 22px 23px),
        linear-gradient(180deg, #f0e4ea, #e6d6dd);
    }
    body[data-view="bedside"] .view-toggle { background: var(--plum-mid); box-shadow: 0 3px 8px rgba(46,27,74,.28); }

    /* Hide rating + tag groups in the add modal when the book isn't finished yet
       (adding to bedside, or starting to read — no review until it's done) */
    #addModal[data-mode="bedside"] .review-only,
    #addModal[data-mode="reading"] .review-only { display: none; }

    /* ---------- currently-reading strip (top of the Shelf) ---------- */
    .reading-strip {
      max-width: 48rem;
      margin: 0 auto 4px;
      padding: 10px 16px 14px;
    }
    .reading-strip h2 {
      font-size: 13px; letter-spacing: 0.06em; text-transform: uppercase;
      opacity: 0.55; margin: 0 0 8px; font-weight: 600;
    }
    .reading-row {
      display: flex; gap: 12px; overflow-x: auto;
      padding-bottom: 4px; -webkit-overflow-scrolling: touch;
    }
    .reading-card {
      flex: 0 0 auto; display: flex; gap: 10px; align-items: stretch;
      width: 230px; max-width: 78vw;
      padding: 8px; border-radius: 10px;
      background: rgba(255,255,255,.45);
      border: 1px solid rgba(59,36,24,.14);
      box-shadow: 0 4px 10px rgba(0,0,0,.10);
      cursor: pointer; text-align: left; color: var(--ink); font-family: inherit;
      transition: transform .15s ease, box-shadow .15s ease;
    }
    .reading-card:hover, .reading-card:focus-visible {
      transform: translateY(-3px); outline: none;
      box-shadow: 0 8px 16px rgba(0,0,0,.16);
    }
    .reading-card-cover {
      width: 46px; height: 69px; flex-shrink: 0; border-radius: 3px;
      object-fit: cover; background: var(--paper-shade);
      box-shadow: 0 2px 5px rgba(0,0,0,.22);
    }
    .reading-card-cover-fallback {
      width: 46px; height: 69px; flex-shrink: 0; border-radius: 3px;
      box-shadow: 0 2px 5px rgba(0,0,0,.22);
    }
    .reading-card-meta { min-width: 0; flex: 1; display: flex; flex-direction: column; }
    .reading-card-title {
      font-weight: 700; font-size: 13px; line-height: 1.2;
      overflow: hidden; text-overflow: ellipsis;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }
    .reading-card-author {
      font-size: 11px; opacity: 0.65; margin-top: 2px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .reading-card-since { font-size: 10px; opacity: 0.5; margin-top: auto; font-style: italic; }
    /* progress bar + page line under a currently-reading card */
    .reading-progress {
      margin-top: auto; display: flex; flex-direction: column; gap: 4px; padding-top: 6px;
    }
    .reading-bar-row { display: flex; align-items: center; gap: 6px; }
    .reading-bar { flex: 1; height: 7px; border-radius: 999px; background: rgba(59,36,24,.14); overflow: hidden; }
    .reading-bar > span {
      display: block; height: 100%; border-radius: 999px;
      background: linear-gradient(90deg, var(--wood-mid), var(--wood-light));
    }
    .reading-pct { font-size: 10px; font-weight: 600; opacity: 0.6; font-variant-numeric: tabular-nums; flex-shrink: 0; }
    .reading-page { font-size: 10px; opacity: 0.55; font-variant-numeric: tabular-nums; }
    body[data-view="bedside"] .reading-strip { display: none; }

    /* ---------- header icon button (stats) ---------- */
    .icon-btn {
      background: rgba(59,36,24,.08); border: 1px solid rgba(59,36,24,.15);
      border-radius: 999px; width: 34px; height: 34px;
      display: inline-flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--ink); padding: 0;
      transition: background .15s ease;
    }
    .icon-btn:hover { background: rgba(59,36,24,.14); }
    .icon-btn svg { width: 18px; height: 18px; }

    /* ---------- stats modal ---------- */
    #statsModal { width: min(94vw, 520px); }
    .stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 4px 0 18px; }
    .stat-card {
      background: rgba(59,36,24,.05); border: 1px solid rgba(59,36,24,.12);
      border-radius: 10px; padding: 12px 14px;
    }
    .stat-num { font-size: 26px; font-weight: 700; line-height: 1; }
    .stat-label { font-size: 11px; opacity: 0.6; margin-top: 5px; letter-spacing: 0.03em; }
    .stat-section-label {
      font-size: 12px; letter-spacing: 0.05em; text-transform: uppercase;
      opacity: 0.55; font-weight: 600; margin: 16px 0 8px;
    }
    .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 12px; }
    .bar-label { width: 92px; flex-shrink: 0; opacity: 0.75; text-align: right;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bar-track { flex: 1; background: rgba(59,36,24,.08); border-radius: 999px; height: 14px; overflow: hidden; }
    .bar-fill { height: 100%; background: var(--wood-mid); border-radius: 999px; min-width: 2px; }
    .bar-value { width: 34px; flex-shrink: 0; opacity: 0.6; font-variant-numeric: tabular-nums; }
    .month-chart { display: flex; align-items: flex-end; gap: 4px; height: 90px; margin-top: 4px; }
    .month-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; height: 100%; justify-content: flex-end; }
    .month-bar { width: 100%; background: var(--wood-mid); border-radius: 3px 3px 0 0; min-height: 2px; }
    .month-bar-label { font-size: 9px; opacity: 0.5; }
    .stats-empty { opacity: 0.6; font-size: 14px; text-align: center; padding: 24px 0; }

    /* ---------- shelf controls (sort) ---------- */
    .shelf-controls {
      padding: 4px 16px 0;
      font-size: 13px;
    }
    .sort-control {
      display: inline-flex; align-items: center; gap: 7px;
      cursor: pointer; opacity: 0.75;
    }
    .sort-control svg { width: 14px; height: 14px; opacity: 0.7; }
    .sort-control span { opacity: 0.7; letter-spacing: 0.02em; }
    .shelf-controls select {
      background: transparent;
      border: none;
      padding: 2px 18px 2px 2px;
      font-family: inherit; font-size: inherit; font-weight: 600;
      color: var(--ink);
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 6'><polyline points='0,0 6,6 12,0' fill='none' stroke='%233b2418' stroke-width='1.5' opacity='0.6'/></svg>");
      background-repeat: no-repeat;
      background-position: right 2px center;
      background-size: 10px;
      max-width: 180px;
    }
    .shelf-controls select:focus { outline: none; }

    /* ---------- shelf section labels (group dividers per sort) ---------- */
    .section-label {
      display: flex; align-items: center; gap: 12px;
      max-width: 48rem; margin: 18px auto 0; padding: 0 22px;
      color: rgba(59,36,24,.55);
      font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 600;
    }
    .section-label::before, .section-label::after {
      content: ""; height: 1px; background: rgba(59,36,24,.16); flex: 1;
    }
    body[data-view="bedside"] .section-label { color: rgba(89,48,75,.6); }
    body[data-view="bedside"] .section-label::before,
    body[data-view="bedside"] .section-label::after { background: rgba(89,48,75,.18); }
  </style>
</head>
<body>
  <header class="max-w-3xl mx-auto px-4 pt-6 pb-2 flex items-start justify-between gap-3">
    <div>
      <h1 class="text-3xl font-bold tracking-tight">Bookshelf</h1>
      <p id="subtitle" class="text-sm opacity-60 italic">finished books look better on a shelf</p>
    </div>
    <div class="header-right">
      <div class="header-icons">
        <button id="statsBtn" class="icon-btn" type="button" aria-label="Reading stats" title="Reading stats">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="6" y1="20" x2="6" y2="13"></line>
            <line x1="12" y1="20" x2="12" y2="4"></line>
            <line x1="18" y1="20" x2="18" y2="9"></line>
          </svg>
        </button>
        <button id="profileBtn" class="profile-chip" type="button">signing in...</button>
      </div>
      <button id="viewToggle" class="view-toggle" type="button">Go to Bedside →</button>
    </div>
  </header>

  <div class="shelf-controls max-w-3xl mx-auto">
    <label class="sort-control">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M3 5h18l-7 8v6l-4-2v-4z"></path>
      </svg>
      <span>sort by</span>
      <select id="sortSelect" aria-label="Sort by">
        <option value="completed">most recent</option>
        <option value="author">author</option>
        <option value="genre">genre</option>
        <option value="length">length</option>
      </select>
    </label>
  </div>

  <section id="readingStrip" class="reading-strip hidden" aria-label="Currently reading"></section>

  <main id="shelves" class="max-w-3xl mx-auto px-2 pt-2 pb-32"></main>

  <button id="addBtn" class="fab" type="button" aria-label="Add a finished book">+</button>

  <dialog id="mysteryModal" aria-labelledby="mysteryTitleLabel">
    <form method="dialog" class="modal-inner">
      <h2 id="mysteryTitleLabel" class="text-xl font-bold leading-tight mb-3">A book for you…</h2>
      <div id="mysteryContent"></div>
      <div class="flex gap-2 mt-4">
        <button type="button" id="tryAnotherBtn" class="btn-wood flex-1 bg-opacity-20 bg-black text-[var(--ink)]">Try another</button>
        <button type="button" id="addMysteryBtn" class="btn-wood flex-1">Add to bedside</button>
      </div>
    </form>
  </dialog>

  <dialog id="bookModal" aria-labelledby="modalTitle">
    <form method="dialog" class="modal-inner">
      <div id="modalContent"></div>
      <button class="btn-wood mt-4" type="submit" value="close">close</button>
    </form>
  </dialog>

  <dialog id="addModal" aria-labelledby="addTitleLabel">
    <form id="addForm" class="modal-inner space-y-4">
      <h2 id="addTitleLabel" class="text-xl font-bold leading-tight">Add a finished book</h2>

      <!-- Default: search Google Books -->
      <div id="searchSection">
        <label class="block text-sm opacity-70 mb-1">Find your book</label>
        <input type="text" id="bookSearch" placeholder="Type a title or author…"
               autocomplete="off"

  <!-- Classics recommendation pool lives in its own file — extends window.CLASSICS, used by the module below -->
  <script src="classics.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, setDoc, onSnapshot, query, orderBy, serverTimestamp, deleteDoc, doc, updateDoc, writeBatch } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
    import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-functions.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAHMaWQRXsAglvgPxsAfR0tmTNzSo67-Y4",
      authDomain: "bookshelf-anthony.firebaseapp.com",
      projectId: "bookshelf-anthony",
      storageBucket: "bookshelf-anthony.firebasestorage.app",
      messagingSenderId: "723627755565",
      appId: "1:723627755565:web:5c96e32a6b9cee44ed50a4",
      measurementId: "G-XNE7ET849Z"
    };

    // Google Books API key — client-side, restricted by referrer to anthonygeo3.github.io
    const GOOGLE_BOOKS_KEY = "AIzaSyBSlndU-ynvDIPzoPxaB9EjbYbEJSzBjAc";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const functions = getFunctions(app);
    // Haiku-powered recommendations (Cloud Function holds the Anthropic key).
    const recommendBooksFn = httpsCallable(functions, 'recommendBooks');

    // Shared data path — every device reads/writes the same household collection
    // (same pattern as A-to-A-Walking). The `profile` field on each book says whose it is.
    // Anonymous auth is kept purely as the security-rules gate (request.auth != null).
    const BOOKS_PATH = 'households/main/books';

    let currentUser = null;
    let books = [];

    // Add-book modal state (search, manual fallback, selected result)
    let selectedBook = null;   // { title, author, cover }
    let searchTimer = null;
    let lastQuery = '';
    let backfillTried = false; // one-shot cover backfill per session
    const searchCache = new Map(); // term → filtered items array (in-session, prevents duplicate API hits)

    // Two named profiles, shared across all devices (v26+). Tap the chip to swap views.
    // Which profile you're *looking at* is per-device (localStorage); the books themselves
    // live in one shared collection partitioned by the `profile` field.
    const PROFILES = ['anthony', 'amy'];
    let activeProfile = localStorage.getItem('bookshelf:profile') || 'anthony';

    function setActiveProfile(name) {
      if (!PROFILES.includes(name)) return;
      activeProfile = name;
      localStorage.setItem('bookshelf:profile', name);
      const chip = document.getElementById('profileBtn');
      if (chip && currentUser) chip.textContent = name;
      document.body.dataset.profile = name;
      document.title = `${name[0].toUpperCase() + name.slice(1)}'s Bookshelf`;
      renderShelves();
    }
    // Initial paint before auth resolves
    document.body.dataset.profile = activeProfile;
    document.title = `${activeProfile[0].toUpperCase() + activeProfile.slice(1)}'s Bookshelf`;

    // ---- View state: Shelf (finished) vs Bedside (planned/to-read) ----
    let activeView = localStorage.getItem('bookshelf:view') || 'bookshelf';
    const VIEW_SUBTITLES = {
      bookshelf: 'finished books look better on a shelf',
      bedside:   "what's next on the pile",
    };
    function setActiveView(view) {
      if (view !== 'bookshelf' && view !== 'bedside') return;
      activeView = view;
      localStorage.setItem('bookshelf:view', view);
      document.body.dataset.view = view;
      const toggle = document.getElementById('viewToggle');
      if (toggle) toggle.textContent = view === 'bedside' ? '← Back to Shelf' : 'Go to Bedside →';
      const subtitleEl = document.getElementById('subtitle');
      if (subtitleEl) subtitleEl.textContent = VIEW_SUBTITLES[view];
      renderShelves();
    }
    // Paint initial state before auth/data resolve so the tabs+wall match localStorage
    document.body.dataset.view = activeView;

    // ---- Sort + filter state (Shelf only) ----
    let activeSort = localStorage.getItem('bookshelf:sort') || 'completed';
    function setActiveSort(value) {
      activeSort = value;
      localStorage.setItem('bookshelf:sort', value);
      renderShelves();
    }

    // Palette for randomised spine generation
    const spineColors = ['#5a2828', '#2d4a2b', '#4a3b6b', '#b06a2c', '#1d3557', '#7a5230', '#3d5a3d'];
    const inkColors = ['#f5e6c8', '#e8d8a0', '#f0e6d0', '#f4ecd8', '#f1faee', '#f4d27a', '#e8d8a0'];

    // Curated classics list lives in classics.js (loaded as a regular script above) — keeps this
    // file's edit context smaller. Mutating CLASSICS at runtime would be bad, but we just read it.
    const CLASSICS = window.CLASSICS || [];

    // Fast lookup into the curated pool by "title|author" (case-insensitive). Used to auto-fill
    // tone/pace/chapter-length chips when the user adds a book we already have rich tags for —
    // they can still override anything before saving.
    const POOL_BY_KEY = new Map(
      CLASSICS.map(c => [`${c.title.toLowerCase()}|${c.author.toLowerCase()}`, c])
    );
    function findInPool(title, author) {
      if (!title || !author) return null;
      return POOL_BY_KEY.get(`${title.toLowerCase()}|${author.toLowerCase()}`) || null;
    }

    // ---- Recommendation engine ----
    // Build a normalised taste profile from the user's finished, tagged books.
    // Higher-rated books carry more weight.
    function buildTasteProfile(finishedBooks) {
      const genreScores = {};
      const toneScores = {};
      const paceCounts = { 'Slow burn': 0, 'Steady': 0, 'Propulsive': 0 };
      for (const book of finishedBooks) {
        const weight = (book.rating || 3) / 5;
        (book.genres || []).forEach(g => { genreScores[g] = (genreScores[g] || 0) + weight; });
        (book.tone   || []).forEach(t => { toneScores[t]  = (toneScores[t]  || 0) + weight; });
        if (book.pace) paceCounts[book.pace] = (paceCounts[book.pace] || 0) + weight;
      }
      const maxG = Math.max(1, ...Object.values(genreScores));
      const maxT = Math.max(1, ...Object.values(toneScores));
      const preferredPace = Object.entries(paceCounts).sort((a, b) => b[1] - a[1])[0]?.[0] || 'Steady';
      return {
        genreScores: Object.fromEntries(Object.entries(genreScores).map(([k, v]) => [k, v / maxG])),
        toneScores:  Object.fromEntries(Object.entries(toneScores).map(([k, v])  => [k, v / maxT])),
        preferredPace,
        hasData: finishedBooks.length > 0,
      };
    }

    function scoreCandidate(candidate, profile) {
      const gAvg = candidate.genres.length === 0 ? 0
        : candidate.genres.reduce((s, g) => s + (profile.genreScores[g] || 0), 0) / candidate.genres.length;
      const tAvg = candidate.tone.length === 0 ? 0
        : candidate.tone.reduce((s, t) => s + (profile.toneScores[t] || 0), 0) / candidate.tone.length;
      const paceMatch = candidate.pace === profile.preferredPace ? 1.0 : 0.5;
      return 0.5 * gAvg + 0.3 * tAvg + 0.2 * paceMatch;
    }

    // 25% of the time, pick a stretch — a low-scoring candidate, deliberately outside taste.
    function shouldStretch() { return Math.random() < 0.25; }

    function pickRecommendation(classics, finishedBooks, ownedBooks, isStretch) {
      // Exclude anything already in the user's world — finished, bedside, or currently reading.
      const excluded = new Set(
        ownedBooks.map(b => `${(b.title || '').toLowerCase()}|${(b.author || '').toLowerCase()}`)
      );
      const candidates = classics.filter(c =>
        !excluded.has(`${c.title.toLowerCase()}|${c.author.toLowerCase()}`)
      );
      if (candidates.length === 0) return null;

      const profile = buildTasteProfile(finishedBooks);
      if (!profile.hasData) {
        // No taste data yet — just pick at random
        return candidates[Math.floor(Math.random() * candidates.length)];
      }

      const scored = candidates
        .map(c => ({ book: c, score: scoreCandidate(c, profile) }))
        .sort((a, b) => b.score - a.score);

      if (isStretch) {
        // Pick from the bottom 40% — deliberately outside the comfort zone
        const stretchPool = scored.slice(Math.floor(scored.length * 0.6));
        const pick = stretchPool[Math.floor(Math.random() * Math.min(stretchPool.length, 10))];
        return pick ? pick.book : scored[scored.length - 1].book;
      }

      // Otherwise: weighted random from the top 5 — gives variety without straying far
      const topN = Math.min(5, scored.length);
      const top = scored.slice(0, topN);
      const weights = top.map((_, i) => topN - i);
      const total = weights.reduce((a, b) => a + b, 0);
      let r = Math.random() * total;
      for (let i = 0; i < top.length; i++) {
        r -= weights[i];
        if (r < 0) return top[i].book;
      }
      return top[0].book;
    }

    function reasoningFor(candidate, profile, isStretch) {
      if (isStretch) return 'a stretch pick — outside your usual taste. worth a try?';
      if (!profile.hasData) return 'from the classics list — tag a few finished books to make these smarter';

      const matchedGenres = candidate.genres.filter(g => (profile.genreScores[g] || 0) >= 0.5);
      const matchedTones  = candidate.tone .filter(t => (profile.toneScores[t]  || 0) >= 0.5);
      const bits = [];
      if (matchedTones.length)  bits.push(matchedTones.slice(0, 2).join(', ').toLowerCase());
      if (matchedGenres.length) bits.push(matchedGenres.slice(0, 2).join(' & ').toLowerCase());
      if (bits.length === 0) return 'a quieter match — fits your overall taste roughly';
      return `you tend to like ${bits.join(' / ')} books`;
    }

    // ---- Haiku recommendation (via Firebase Function) ----
    // Sends a compact digest of the reader's ratings + reviews to Haiku and gets
    // back real book suggestions with a personal reason. Batches results so a
    // single API call covers several "try another" re-rolls. Any failure (offline,
    // key/quota issue, too little history) returns null and the caller falls back
    // to the local classics engine — so the mystery button never breaks.
    let llmQueue = [];            // pending Haiku picks for the active profile
    let llmQueueProfile = null;   // which profile llmQueue was built for
    const llmShown = new Set();   // "Title by Author" already surfaced (extra excludes)

    // Highest-rated first, capped, with a trimmed review — keeps the prompt tight.
    function buildTasteDigest(finishedBooks) {
      return finishedBooks
        .filter(b => b.rating != null)
        .sort((a, b) => (b.rating || 0) - (a.rating || 0))
        .slice(0, 40)
        .map(b => {
          const note = (b.notes || '').trim().replace(/\s+/g, ' ').slice(0, 200);
          const tags = [...(b.genres || []), ...(b.tone || [])].slice(0, 4).join(', ');
          let line = `- ${b.title} by ${b.author} — ${b.rating}★`;
          if (tags) line += ` [${tags}]`;
          if (note) line += ` — "${note}"`;
          return line;
        })
        .join('\n');
    }

    async function fetchLLMBatch(finishedBooks, ownedBooks) {
      const rated = finishedBooks.filter(b => b.rating != null);
      if (rated.length < 2) return []; // too little signal — let the local engine handle it
      const digest = buildTasteDigest(finishedBooks);
      const exclude = [
        ...ownedBooks.map(b => `${b.title} by ${b.author}`),
        ...llmShown,
      ];
      const res = await recommendBooksFn({ digest, exclude, count: 5 });
      const recs = (res && res.data && res.data.recommendations) || [];
      const ownedKeys = new Set(
        ownedBooks.map(b => `${(b.title || '').toLowerCase()}|${(b.author || '').toLowerCase()}`)
      );
      return recs.filter(r => {
        const key = `${r.title.toLowerCase()}|${r.author.toLowerCase()}`;
        return !ownedKeys.has(key) && !llmShown.has(`${r.title} by ${r.author}`);
      });
    }

    async function pickLLMRecommendation(finishedBooks, ownedBooks) {
      if (llmQueueProfile !== activeProfile) { // reset when switching profiles
        llmQueue = [];
        llmShown.clear();
        llmQueueProfile = activeProfile;
      }
      if (llmQueue.length === 0) {
        llmQueue = await fetchLLMBatch(finishedBooks, ownedBooks);
      }
      const rec = llmQueue.shift();
      if (!rec) return null;
      llmShown.add(`${rec.title} by ${rec.author}`);
      return {
        title: rec.title,
        author: rec.author,
        reason: rec.reason,
        genres: [], tone: [], pace: null, chapterLength: null,
        source: 'llm',
      };
    }

    // Auth & Data syncing
    onAuthStateChanged(auth, (user) => {
      if (user) {
        currentUser = user;
        document.getElementById('profileBtn').textContent = activeProfile;

        const q = query(collection(db, BOOKS_PATH), orderBy('createdAt', 'asc'));
        onSnapshot(q, (snapshot) => {
          books = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          renderShelves();
          // One-shot per session: fill in any missing Google Books details (cover/pageCount/year).
          if (!backfillTried && books.length > 0) {
            backfillTried = true;
            backfillMissingDetails();
          }
        });

        // One-shot: copy this device's legacy per-UID books up to the shared collection.
        migrateLegacyBooks(user).catch(err => console.warn('[migrate] failed:', err));
      } else {
        currentUser = null;
        books = [];
        document.getElementById('profileBtn').textContent = 'offline';
        renderShelves();
      }
    });

    // Legacy migration — pre-v26 each device stored books under users/{uid}/books.
    // Copies them into the shared household collection, reusing the same doc IDs so the
    // copy is idempotent. Never overwrites a doc that already exists in the shared
    // collection (protects later edits if this somehow re-runs). Originals are left
    // untouched under the old path as a safety net. localStorage flag skips the
    // check entirely on subsequent loads.
    async function migrateLegacyBooks(user) {
      const flagKey = `bookshelf:migrated:${user.uid}`;
      if (localStorage.getItem(flagKey)) return;

      const legacySnap = await getDocs(collection(db, `users/${user.uid}/books`));
      if (legacySnap.empty) { localStorage.setItem(flagKey, '1'); return; }

      const sharedSnap = await getDocs(collection(db, BOOKS_PATH));
      const sharedIds = new Set(sharedSnap.docs.map(d => d.id));

      let copied = 0;
      const batch = writeBatch(db);
      legacySnap.forEach(d => {
        if (sharedIds.has(d.id)) return;
        batch.set(doc(db, BOOKS_PATH, d.id), d.data());
        copied++;
      });
      if (copied > 0) await batch.commit();
      localStorage.setItem(flagKey, '1');
      console.log(`[migrate] copied ${copied} legacy book(s) to shared shelf (${legacySnap.size - copied} already present).`);
    }

    signInAnonymously(auth).catch(console.error);

    // Google Books API helper — used for manual-entry covers + cover backfill
    async function fetchCover(title, author) {
      try {
        const q = encodeURIComponent(`intitle:${title}+inauthor:${author}`);
        const keyParam = GOOGLE_BOOKS_KEY ? `&key=${GOOGLE_BOOKS_KEY}` : '';
        const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${q}&maxResults=1${keyParam}`);
        const data = await res.json();
        const thumb = data.items?.[0]?.volumeInfo?.imageLinks?.thumbnail;
        return thumb ? thumb.replace('http:', 'https:') : null;
      } catch (e) {
        console.warn('Failed to fetch cover', e);
        return null;
      }
    }

    // Richer Google Books fetch — pulls cover + description + page count + year + categories in one call.
    // Used by the mystery recommendation card and the auto-tagging flow.
    // In-session cached so re-rolls don't re-fetch known titles.
    const bookDetailsCache = new Map();
    async function fetchBookDetails(title, author) {
      const cacheKey = `${title.toLowerCase()}|${author.toLowerCase()}`;
      if (bookDetailsCache.has(cacheKey)) return bookDetailsCache.get(cacheKey);
      try {
        const q = encodeURIComponent(`intitle:${title}+inauthor:${author}`);
        const keyParam = GOOGLE_BOOKS_KEY ? `&key=${GOOGLE_BOOKS_KEY}` : '';
        const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${q}&maxResults=1${keyParam}`);
        const data = await res.json();
        const vi = data.items?.[0]?.volumeInfo;
        if (!vi) { bookDetailsCache.set(cacheKey, null); return null; }
        const result = {
          cover:         (vi.imageLinks?.thumbnail || '').replace('http:', 'https:') || null,
          description:   vi.description   || null,
          pageCount:     vi.pageCount     || null,
          publishedDate: vi.publishedDate || null,
          categories:    vi.categories    || [],
        };
        bookDetailsCache.set(cacheKey, result);
        return result;
      } catch (e) {
        console.warn('Failed to fetch book details', e);
        return null;
      }
    }

    // Translate Google's noisy category strings (e.g. "Fiction / Science Fiction / Apocalyptic")
    // into the chip vocabulary we use everywhere else. Best-effort; user can override via chips.
    function mapGoogleCategoriesToChips(categories) {
      if (!categories || !categories.length) return [];
      const text = categories.join(' / ').toLowerCase();
      const out = new Set();
      if (text.includes('science fiction'))             out.add('Sci-fi');
      if (text.includes('fantasy'))                     out.add('Fantasy');
      if (text.includes('romance'))                     out.add('Romance');
      if (/thriller|mystery|suspense|crime/.test(text)) out.add('Mystery/Thriller');
      if (text.includes('horror'))                      out.add('Horror');
      if (text.includes('historical'))                  out.add('Historical fiction');
      if (text.includes('literary'))                    out.add('Literary fiction');
      if (text.includes('classics'))                    out.add('Classic');
      if (/biography|autobiography|memoir/.test(text))  out.add('Biography/Memoir');
      if (text.includes('philosophy'))                  out.add('Philosophy');
      if (text.includes('poetry'))                      out.add('Poetry');
      // Pop science: only if "science" appears without "science fiction"
      if (text.includes('science') && !text.includes('science fiction')) out.add('Pop science');
      // Fallbacks for under-tagged categories
      if (out.size === 0) {
        if (text.includes('fiction')) {
          out.add('Literary fiction');
        } else if (/history|essays|self-?help|business|cooking|travel|religion|spirituality|health|reference|education|computer|technology|true crime|drama|play/.test(text)) {
          out.add('Non-fiction');
        }
      }
      return Array.from(out);
    }

    // Strip Google's embedded HTML tags from descriptions and break at the nearest sentence
    // boundary near the limit so truncation reads cleanly.
    function truncateText(s, maxLen) {
      if (!s) return '';
      const clean = s.replace(/<[^>]+>/g, '').replace(/\s+/g, ' ').trim();
      if (clean.length <= maxLen) return clean;
      const slice = clean.substring(0, maxLen);
      const lastSentenceEnd = Math.max(slice.lastIndexOf('. '), slice.lastIndexOf('! '), slice.lastIndexOf('? '));
      if (lastSentenceEnd > maxLen * 0.55) {
        return slice.substring(0, lastSentenceEnd + 1);
      }
      return slice.trim() + '…';
    }

    // ---- Book search (Google Books) ----
    async function runBookSearch(term) {
      const resultsEl = document.getElementById('searchResults');

      // In-session cache: never re-fetch the same query in one session
      if (searchCache.has(term)) {
        renderSearchResults(searchCache.get(term));
        return;
      }

      resultsEl.innerHTML = '<div class="search-status">searching…</div>';
      const keyParam = GOOGLE_BOOKS_KEY ? `&key=${GOOGLE_BOOKS_KEY}` : '';
      const url = `https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(term)}&maxResults=6${keyParam}`;

      try {
        const res = await fetch(url);
        const bodyText = await res.text();
        let data = null;
        try { data = JSON.parse(bodyText); } catch (_) { /* non-JSON */ }

        if (!res.ok) {
          const msg = (data && data.error && data.error.message) || `HTTP ${res.status}`;
          console.warn('book search HTTP error', { status: res.status, body: bodyText, url });
          resultsEl.innerHTML = `<div class="search-status">search error: ${escapeHtml(msg)}</div>`;
          return;
        }
        if (!data) {
          console.warn('book search non-JSON response', { body: bodyText, url });
          resultsEl.innerHTML = '<div class="search-status">search error: bad response from server</div>';
          return;
        }
        if (data.error) {
          console.warn('book search api error', data.error);
          resultsEl.innerHTML = `<div class="search-status">search error: ${escapeHtml(data.error.message || 'unknown')}</div>`;
          return;
        }

        const items = (data.items || []).filter(i => i.volumeInfo && i.volumeInfo.title);
        searchCache.set(term, items); // cache successful responses only
        renderSearchResults(items);
      } catch (e) {
        console.warn('book search failed (fetch threw)', e, { url });
        resultsEl.innerHTML = `<div class="search-status">search failed: ${escapeHtml(String(e.message || e))}</div>`;
      }
    }

    function renderSearchResults(items) {
      const resultsEl = document.getElementById('searchResults');
      if (items.length === 0) {
        resultsEl.innerHTML = '<div class="search-status">no matches — try a different search</div>';
        return;
      }
      resultsEl.innerHTML = '';
      items.forEach(item => {
        const vi = item.volumeInfo;
        const title = vi.title;
        const author = (vi.authors && vi.authors.length) ? vi.authors.join(', ') : 'Unknown';
        const rawCover = (vi.imageLinks && vi.imageLinks.thumbnail) || '';
        const cover = rawCover ? rawCover.replace('http:', 'https:') : '';
        const pageCount = vi.pageCount || null;
        const publishedDate = vi.publishedDate || null;
        const categories = vi.categories || [];
        const row = document.createElement('button');
        row.type = 'button';
        row.className = 'search-result';
        row.innerHTML = `
          ${cover
            ? `<img src="${escapeHtml(cover)}" class="search-thumb" alt="" loading="lazy">`
            : '<div class="search-thumb-fallback"></div>'}
          <div class="search-meta">
            <div class="search-title">${escapeHtml(title)}</div>
            <div class="search-author">${escapeHtml(author)}</div>
          </div>
        `;
        row.addEventListener('click', () => selectSearchResult(title, author, cover, pageCount, publishedDate, categories));
        resultsEl.appendChild(row);
      });
    }

    function selectSearchResult(title, author, cover, pageCount, publishedDate, categories) {
      selectedBook = {
        title, author,
        cover: cover || null,
        pageCount: pageCount || null,
        publishedDate: publishedDate || null,
        categories: categories || [],
      };
      document.getElementById('searchSection').classList.add('hidden');
      document.getElementById('manualSection').classList.add('hidden');
      document.getElementById('selectedSection').classList.remove('hidden');
      const coverEl = document.getElementById('selectedCover');
      if (cover) { coverEl.src = cover; coverEl.style.display = ''; }
      else { coverEl.removeAttribute('src'); coverEl.style.display = 'none'; }
      document.getElementById('selectedTitle').textContent = title;
      document.getElementById('selectedAuthor').textContent = author;
      // Pre-fill the editable page count from Google's value (blank if it didn't return one).
      document.getElementById('addPageCount').value = pageCount || '';

      // Auto-pre-select genre chips from Google's categories. User can adjust before saving.
      // Only touches the genre group — other chips are left untouched.
      document.querySelectorAll('#genreChips .chip.active').forEach(c => c.classList.remove('active'));
      mapGoogleCategoriesToChips(categories || []).forEach(g => {
        const chip = document.querySelector(`#genreChips .chip[data-value="${CSS.escape(g)}"]`);
        if (chip) chip.classList.add('active');
      });

      // If this exact title is in our curated pool, we have hand-tagged tone/pace/chapter-length —
      // pre-fill all of it (overriding the rough Google genre guess). User can still override.
      prefillChipsFromPool(findInPool(title, author));
    }

    // Activate genre/tone/pace/chapter chips from a curated pool entry. No-op if entry is null.
    // Clears the relevant groups first so we don't merge with a previous selection.
    function prefillChipsFromPool(entry) {
      if (!entry) return;
      const activate = (groupId, value) => {
        if (!value) return;
        const chip = document.querySelector(`#${groupId} .chip[data-value="${CSS.escape(value)}"]`);
        if (chip) chip.classList.add('active');
      };
      ['genreChips', 'toneChips', 'paceChips', 'chapterChips'].forEach(id => {
        document.querySelectorAll(`#${id} .chip.active`).forEach(c => c.classList.remove('active'));
      });
      (entry.genres || []).forEach(g => activate('genreChips', g));
      (entry.tone   || []).forEach(t => activate('toneChips',  t));
      activate('paceChips',    entry.pace);
      activate('chapterChips', entry.chapterLength);
    }

    // ---- Completion-date input helpers ----
    function dateToInputValue(d) {
      const y = d.getFullYear(), m = String(d.getMonth() + 1).padStart(2, '0'), day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }
    // Parse a yyyy-mm-dd value into a local Date at noon (avoids UTC day-shift). Null if blank.
    function parseDateInput(value) {
      if (!value) return null;
      const [y, m, d] = value.split('-').map(Number);
      if (!y || !m || !d) return null;
      return new Date(y, m - 1, d, 12, 0, 0);
    }
    // Seed the "Date finished" input from a timestamp (or today if none), capped at today.
    function setCompletedDateInput(ts) {
      const input = document.getElementById('addCompletedDate');
      const ms = tsMillis(ts);
      input.value = dateToInputValue(ms ? new Date(ms) : new Date());
      input.max = dateToInputValue(new Date());
    }

    function resetAddForm() {
      selectedBook = null;
      lastQuery = '';

    // mode: 'shelf' (finished) | 'bedside' (planned) | 'reading' (started, not finished).
    // Called both directly and as a click handler, so ignore a non-string (Event) argument
    // and fall back to the active view.
    function openAddModal(modeArg) {

        ? modeArg
        : (activeView === 'bedside' ? 'bedside' : 'shelf');

    // Open the add modal in "edit" mode — handles both:
    //   - converting a bedside book into a finished, reviewed one (title: "How was it?")
    //   - editing an already-finished book's review (title: "Edit review")
    // Pre-fills everything the book already has so the user only changes what they want.
    function openAddModalForEdit(b) {
      const isUnfinished = (b.status || 'finished') !== 'finished';
      const modal = document.getElementById('addModal');
      modal.dataset.mode = 'shelf';        // always shelf — we're saving review fields either way
      modal.dataset.editing = b.id;        // form submit will updateDoc instead of addDoc
      document.getElementById('addTitleLabel').textContent = isUnfinished ? 'How was it?' : 'Edit review';
      document.getElementById('saveBookBtn').textContent   = 'Save to shelf';

      // Lock the book selection — search hidden, "change" hidden, the selected card shows the book
      selectedBook = { title: b.title, author: b.author, cover: b.cover || null };

      document.getElementById('manualSection').classList.add('hidden');
      document.getElementById('selectedSection').classList.remove('hidden');
      const coverEl = document.getElementById('selectedCover');
